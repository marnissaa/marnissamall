<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>مول لاكيس | المحفظة</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="images/logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    /* ========== الألوان الأساسية ========== */
    :root {
      --blue-primary: #0057b3;
      --blue-dark: #003d80;
      --blue-light: #3a8fd4;
      --black: #0a0a0a;
      --black-light: #0d1117;
      --gray: #161b22;
      --text-light: #ffffff;
      --text-muted: #c9d1d9;
      --text-dim: #8b949e;
      --gold: #C4A06A;
      --success: #25D366;
      --danger: #ff4757;
      --warning: #ffa502;
      --sidebar-width: 240px;
    }

    /* ========== الوضع الداكن ========== */
    body {
      --bg: #0a0a0a;
      --bg2: #0d1117;
      --bg3: #161b22;
      --text: #ffffff;
      --text-muted: #c9d1d9;
      --text-dim: #8b949e;
      --border: rgba(0,87,179,0.35);
      --border2: rgba(0,87,179,0.5);
      --card: rgba(13,17,23,0.85);
      --card-hover: rgba(0,87,179,0.2);
      --radius: 14px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ========== الوضع الفاتح ========== */
    body.blue-theme {
      --bg: #e8f0fe;
      --bg2: #ffffff;
      --bg3: #f0f5ff;
      --text: #0a0a0a;
      --text-muted: #1a3a5c;
      --text-dim: #4a6a8c;
      --border: rgba(0,87,179,0.2);
      --border2: rgba(0,87,179,0.3);
      --card: rgba(255,255,255,0.9);
      --card-hover: rgba(0,87,179,0.1);
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg2); border-radius: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--blue-primary); border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--blue-dark); }

    body {
      background: var(--bg);
      font-family: 'Tajawal', sans-serif;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      transition: var(--transition);
    }

    /* ===== SIDEBAR (سيتم تحميله من pos-sidebar.html) ===== */
    #sidebar-container {
      width: var(--sidebar-width);
      flex-shrink: 0;
    }

    /* ===== TOGGLE THEME ===== */
    .theme-toggle {
      background: var(--bg2); border: 1px solid var(--border);
      color: var(--text-muted); padding: 6px 10px; border-radius: 20px;
      cursor: pointer; font-size: 0.7rem; transition: var(--transition);
      display: flex; align-items: center; gap: 4px;
    }
    .theme-toggle:hover { background: var(--card-hover); color: var(--text); border-color: var(--blue-primary); }

    /* ===== MAIN CONTENT ===== */
    .main-content {
      flex: 1;
      padding: 12px 16px;
      min-height: 100vh;
      background: var(--bg);
      transition: var(--transition);
    }

    .container { max-width: 1600px; margin: 0 auto; }

    .page-header {
      padding: 10px 0; border-bottom: 2px solid var(--border);
      margin-bottom: 12px; display: flex; justify-content: space-between;
      align-items: center; flex-wrap: wrap; gap: 8px;
    }
    .page-header h1 {
      font-size: 1.5rem; border-right: 4px solid var(--blue-primary);
      padding-right: 12px;
      background: linear-gradient(135deg, var(--text) 60%, var(--blue-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .page-header .badge {
      background: var(--blue-primary); padding: 4px 14px; border-radius: 20px; font-size: 0.75rem; color: #fff;
    }

    .section-divider {
      height: 1px; background: linear-gradient(to left, transparent, var(--blue-primary), transparent);
      margin: 3px 0 12px 0; opacity: 0.25;
    }

    .wallet-cards {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px; margin-bottom: 20px;
    }
    .wallet-card {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; text-align: center;
      transition: var(--transition);
    }
    .wallet-card:hover { border-color: var(--blue-primary); }
    .wallet-card .card-icon { font-size: 2rem; color: var(--blue-primary); margin-bottom: 8px; }
    .wallet-card .card-value { font-size: 2rem; font-weight: 800; color: var(--gold); }
    .wallet-card .card-value .stat-item { display: block; font-size: 1.2rem; }
    .wallet-card .card-value .stat-item .num { color: var(--gold); font-weight: 700; }
    .wallet-card .card-label { color: var(--text-dim); font-size: 0.75rem; margin-top: 4px; }
    .wallet-card .card-sub { color: var(--text-dim); font-size: 0.6rem; margin-top: 2px; }

    .transfer-section {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 16px;
    }
    .transfer-section .transfer-info { display: flex; flex-direction: column; gap: 4px; }
    .transfer-section .transfer-info .label { color: var(--text-dim); font-size: 0.75rem; }
    .transfer-section .transfer-info .amount { font-size: 1.8rem; font-weight: 700; color: var(--gold); }
    .transfer-section .btn-transfer {
      padding: 10px 30px; border-radius: 30px; background: var(--gold);
      border: none; color: #0a0a0a; font-weight: bold; cursor: pointer;
      transition: var(--transition); font-size: 1rem;
    }
    .transfer-section .btn-transfer:hover { background: #b8925a; transform: scale(1.04);
      box-shadow: 0 4px 16px rgba(196, 160, 106, 0.3); }
    .transfer-section .btn-transfer:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .transfer-history {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; margin-top: 16px;
    }
    .transfer-history .history-title { 
      color: var(--blue-primary); font-size: 0.9rem; font-weight: bold; margin-bottom: 8px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .transfer-history .history-title .badge-count {
      background: var(--border); padding: 2px 10px; border-radius: 20px; font-size: 0.7rem;
      color: var(--text-dim);
    }
    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid var(--border);
      font-size: 0.75rem;
      transition: var(--transition);
    }
    .history-item:hover { background: var(--card-hover); padding: 8px 4px; border-radius: 6px; }
    .history-item .h-date { color: var(--text-dim); font-size: 0.65rem; min-width: 120px; }
    .history-item .h-type {
      display: flex; align-items: center; gap: 4px;
      padding: 2px 10px; border-radius: 20px; font-size: 0.6rem; font-weight: bold;
    }
    .history-item .h-type.income { background: rgba(37, 211, 102, 0.15); color: var(--success); }
    .history-item .h-type.outcome { background: rgba(255, 71, 87, 0.15); color: var(--danger); }
    .history-item .h-type.transfer { background: rgba(196, 160, 106, 0.15); color: var(--gold); }
    .history-item .h-amount { font-weight: 700; min-width: 80px; text-align: left; }
    .history-item .h-amount.positive { color: var(--success); }
    .history-item .h-amount.negative { color: var(--danger); }
    .history-item .h-amount.transfer { color: var(--gold); }
    .history-item .h-note { color: var(--text-dim); font-size: 0.6rem; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .history-empty { text-align: center; padding: 30px 20px; color: var(--text-dim); font-size: 0.85rem; }
    .history-empty i { font-size: 2rem; display: block; margin-bottom: 8px; opacity: 0.3; }

    .toast-msg {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg3); border: 2px solid var(--border);
      border-radius: 14px; padding: 12px 28px; z-index: 9999;
      opacity: 0; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 0.9rem; box-shadow: var(--shadow);
      display: flex; align-items: center; gap: 10px; font-weight: 500;
    }
    .toast-msg.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast-msg.success { border-color: var(--success); color: var(--success); }
    .toast-msg.error { border-color: var(--danger); color: var(--danger); }
    .toast-msg.info { border-color: var(--blue-primary); color: var(--blue-primary); }
    .toast-msg.warning { border-color: var(--warning); color: var(--warning); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1100px) {
      #sidebar-container { width: 60px; }
      .main-content { padding: 12px 12px; }
    }
    @media (max-width: 850px) {
      #sidebar-container { width: 50px; }
      .main-content { padding: 8px 10px; }
      .page-header h1 { font-size: 1.2rem; }
      .wallet-cards { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
      .wallet-card .card-value { font-size: 1.5rem; }
      .wallet-card .card-value .stat-item { font-size: 1rem; }
      .transfer-section { flex-direction: column; text-align: center; }
      .transfer-section .btn-transfer { width: 100%; }
      .history-item { flex-wrap: wrap; gap: 4px; }
      .history-item .h-date { min-width: 80px; font-size: 0.6rem; }
      .history-item .h-note { max-width: 100px; }
    }
    @media (max-width: 480px) {
      #sidebar-container { width: 44px; }
      .main-content { padding: 6px 8px; }
      .page-header h1 { font-size: 1rem; }
      .wallet-cards { grid-template-columns: 1fr 1fr; gap: 8px; }
      .wallet-card { padding: 12px; }
      .wallet-card .card-value { font-size: 1.2rem; }
      .wallet-card .card-value .stat-item { font-size: 0.85rem; }
      .transfer-section .transfer-info .amount { font-size: 1.4rem; }
      .history-item { font-size: 0.65rem; }
      .history-item .h-date { min-width: 60px; font-size: 0.55rem; }
      .history-item .h-note { max-width: 60px; }
      .history-item .h-amount { min-width: 60px; font-size: 0.7rem; }
    }
  </style>
</head>
<body>

<!-- ===== SIDEBAR (سيتم تحميله من pos-sidebar.html) ===== -->
<div id="sidebar-container"></div>

<!-- ===== MAIN CONTENT ===== -->
<div class="main-content">

  <div class="container">

    <!-- ===== PAGE HEADER ===== -->
    <div class="page-header">
      <div>
        <h1>💰 المحفظة المالية</h1>
        <p style="color: var(--text-dim); font-size: 0.7rem; margin-top: 2px;">إدارة الأرباح والتحويلات</p>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span class="badge"><i class="fas fa-store"></i> Marnissa</span>
        <button class="theme-toggle" onclick="toggleTheme()">
          <i class="fas fa-moon"></i>
          <span id="themeLabel">داكن</span>
        </button>
        <button onclick="location.reload()" style="background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 12px;border-radius:20px;cursor:pointer;font-size:0.7rem;transition:var(--transition);"><i class="fas fa-sync-alt"></i></button>
      </div>
    </div>

    <div class="section-divider"></div>

    <!-- ===== WALLET CARDS ===== -->
    <div class="wallet-cards">
      <div class="wallet-card">
        <div class="card-icon"><i class="fas fa-coins"></i></div>
        <div class="card-value">
          <span class="stat-item">💰 <span class="num" id="totalAmount">0.00</span> درهم</span>
        </div>
        <div class="card-label">الرصيد الحالي</div>
        <div class="card-sub">درهم</div>
      </div>
      <div class="wallet-card">
        <div class="card-icon"><i class="fas fa-calendar-day"></i></div>
        <div class="card-value" id="walletToday">0.00</div>
        <div class="card-label">أرباح اليوم</div>
        <div class="card-sub">درهم</div>
      </div>
      <div class="wallet-card">
        <div class="card-icon"><i class="fas fa-calendar-alt"></i></div>
        <div class="card-value" id="walletMonth">0.00</div>
        <div class="card-label">أرباح الشهر</div>
        <div class="card-sub">درهم</div>
      </div>
      <div class="wallet-card">
        <div class="card-icon"><i class="fas fa-trophy"></i></div>
        <div class="card-value" id="walletTotal">0.00</div>
        <div class="card-label">إجمالي الأرباح</div>
        <div class="card-sub">درهم</div>
      </div>
    </div>

    <!-- ===== TRANSFER SECTION ===== -->
    <div class="transfer-section">
      <div class="transfer-info">
        <div class="label">💰 المبلغ القابل للتحويل</div>
        <div class="amount" id="transferAmount">0.00 درهم</div>
      </div>
      <button class="btn-transfer" id="transferBtn" onclick="transferToProject()">
        <i class="fas fa-arrow-up"></i> تحويل للمشروع
      </button>
    </div>

    <!-- ===== TRANSFER HISTORY ===== -->
    <div class="transfer-history">
      <div class="history-title">
        <span><i class="fas fa-history"></i> سجل المعاملات</span>
        <span class="badge-count" id="historyCount">0</span>
      </div>
      <div id="historyContainer">
        <div class="history-empty">
          <i class="fas fa-wallet"></i>
          <p>لا توجد معاملات</p>
          <p style="font-size:0.65rem;margin-top:4px;">ستظهر هنا المبيعات والتحويلات</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast-msg" id="toastMsg"><i class="fas fa-info-circle"></i> <span id="toastText"></span></div>

<script>
  // ==========================================
  // SIDEBAR LOADER
  // ==========================================
  
  // تحميل الـ sidebar من ملف منفصل
  fetch('pos-sidebar.html')
    .then(response => {
      if (!response.ok) throw new Error('Failed to load sidebar');
      return response.text();
    })
    .then(html => {
      document.getElementById('sidebar-container').innerHTML = html;
      
      // تفعيل الرابط النشط
      const currentPage = 'pos-wallet';
      const navItems = document.querySelectorAll('.sidebar .nav-item');
      navItems.forEach(item => {
        const href = item.getAttribute('href');
        if (href && href.includes(currentPage)) {
          item.classList.add('active');
        }
        // عند الضغط على الرابط، إغلاق السايدبار (للموبايل)
        item.addEventListener('click', () => {
          const sidebar = document.querySelector('.sidebar');
          const toggleBtn = document.getElementById('sidebarToggleBtn');
          if (window.innerWidth <= 850 && sidebar) {
            sidebar.classList.remove('open');
            if (toggleBtn) toggleBtn.innerHTML = '☰';
          }
        });
      });
      
      // ربط زر فتح/غلق السايدبار
      const toggleBtn = document.getElementById('sidebarToggleBtn');
      const sidebar = document.querySelector('.sidebar');
      if (toggleBtn && sidebar) {
        toggleBtn.addEventListener('click', function() {
          sidebar.classList.toggle('open');
          const isOpen = sidebar.classList.contains('open');
          toggleBtn.innerHTML = isOpen ? '✕' : '☰';
          toggleBtn.style.background = isOpen ? 'var(--danger)' : 'var(--blue-primary)';
        });
        
        // إغلاق السايدبار عند الضغط خارجها (للموبايل)
        document.addEventListener('click', function(e) {
          if (window.innerWidth <= 850 && sidebar.classList.contains('open')) {
            if (!sidebar.contains(e.target) && !toggleBtn.contains(e.target)) {
              sidebar.classList.remove('open');
              toggleBtn.innerHTML = '☰';
              toggleBtn.style.background = 'var(--blue-primary)';
            }
          }
        });
      }
      
      // تحديث حالة الاتصال في السايدبار
      updateSidebarOnlineStatus(isOnline);
      
      // تحديث عداد الطلبات
      updateSidebarBadge();
    })
    .catch(err => {
      console.error('Error loading sidebar:', err);
      // Fallback: عرض رسالة بديلة
      document.getElementById('sidebar-container').innerHTML = `
        <aside class="sidebar">
          <div class="brand">🧾 مول لاكيس<small>MarnissaMall</small></div>
          <nav>
            <a href="pos.html" class="nav-item"><i class="fas fa-cash-register"></i><span>نقطة البيع</span></a>
            <a href="pos-orders.html" class="nav-item"><i class="fas fa-clipboard-list"></i><span>الطلبات</span><span class="badge-nav" id="sidebarOrdersBadge">0</span></a>
            <a href="pos-transactions.html" class="nav-item"><i class="fas fa-history"></i><span>المعاملات</span></a>
            <a href="pos-wallet.html" class="nav-item active"><i class="fas fa-wallet"></i><span>المحفظة</span></a>
          </nav>
          <div class="sidebar-footer">
            <div class="online-status online" id="sidebarStatus">
              <span class="status-dot online" id="sidebarDot"></span>
              <span id="sidebarStatusText">متصل</span>
            </div>
            <div style="font-size:0.55rem;color:var(--text-dim);"><i class="fas fa-store"></i> Marnissa v2.0</div>
          </div>
        </aside>
      `;
    });

  // ==========================================
  // WALLET PAGE LOGIC
  // ==========================================

  let sb = window.sb;
  let walletId = null;
  let isOnline = navigator.onLine;
  let networkCheckInterval = null;
  let allTransactions = [];

  // ========== TOAST ==========
  function showToast(msg, type) {
    const toast = document.getElementById('toastMsg');
    const icon = document.querySelector('#toastMsg i');
    const text = document.getElementById('toastText');
    const icons = { success: 'fa-check-circle', error: 'fa-times-circle', warning: 'fa-exclamation-triangle', info: 'fa-info-circle' };
    icon.className = 'fas ' + (icons[type] || icons.info);
    text.textContent = msg;
    toast.className = `toast-msg ${type} show`;
    clearTimeout(window._toastTimer);
    window._toastTimer = setTimeout(() => toast.classList.remove('show'), 3500);
  }

  // ========== THEME TOGGLE ==========
  function toggleTheme() {
    document.body.classList.toggle('blue-theme');
    const isBlue = document.body.classList.contains('blue-theme');
    const icon = document.querySelector('.theme-toggle i');
    const label = document.getElementById('themeLabel');
    if (isBlue) {
      icon.className = 'fas fa-sun';
      label.textContent = 'فاتح';
      localStorage.setItem('theme', 'blue');
    } else {
      icon.className = 'fas fa-moon';
      label.textContent = 'داكن';
      localStorage.setItem('theme', 'dark');
    }
  }

  function loadTheme() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'blue') {
      document.body.classList.add('blue-theme');
      document.querySelector('.theme-toggle i').className = 'fas fa-sun';
      document.getElementById('themeLabel').textContent = 'فاتح';
    }
  }

  // ========== NETWORK ==========
  function updateSidebarOnlineStatus(online) {
    const statusEl = document.querySelector('#sidebarStatus');
    const dot = document.querySelector('#sidebarDot');
    const text = document.querySelector('#sidebarStatusText');
    if (!statusEl || !dot || !text) return;
    if (online) {
      statusEl.className = 'online-status online';
      dot.className = 'status-dot online';
      text.textContent = 'متصل';
    } else {
      statusEl.className = 'online-status offline';
      dot.className = 'status-dot offline';
      text.textContent = 'غير متصل';
    }
  }

  window.addEventListener('online', () => {
    isOnline = true;
    updateSidebarOnlineStatus(true);
    showToast('🌐 تم استعادة الاتصال بالإنترنت', 'success');
    setTimeout(() => loadWalletFull(), 1000);
  });

  window.addEventListener('offline', () => {
    isOnline = false;
    updateSidebarOnlineStatus(false);
    showToast('⚠️ انقطع الاتصال بالإنترنت', 'error');
  });

  function startNetworkMonitoring() {
    if (networkCheckInterval) clearInterval(networkCheckInterval);
    networkCheckInterval = setInterval(() => {
      const currentStatus = navigator.onLine;
      if (currentStatus !== isOnline) {
        isOnline = currentStatus;
        updateSidebarOnlineStatus(isOnline);
        if (isOnline) { showToast('🌐 تم استعادة الاتصال', 'success'); loadWalletFull(); }
        else { showToast('⚠️ انقطع الاتصال بالإنترنت', 'error'); }
      }
    }, 5000);
  }

  // ========== UPDATE SIDEBAR BADGE ==========
  async function updateSidebarBadge() {
    try {
      const { count, error } = await sb
        .from('orders')
        .select('*', { count: 'exact', head: true })
        .in('status', ['pending', 'confirmed']);

      if (!error) {
        const badge = document.getElementById('sidebarOrdersBadge');
        if (badge) badge.textContent = count || 0;
      }
    } catch(e) { console.error('Error updating badge:', e); }
  }

  // ========== GET TRANSACTION TYPE ==========
  function getTransactionType(type, status) {
    if (type === 'transfer') {
      return { label: 'تحويل', class: 'transfer', icon: 'fas fa-arrow-up' };
    }
    if (type === 'sale') {
      return { label: 'بيع', class: 'income', icon: 'fas fa-arrow-down' };
    }
    if (type === 'refund') {
      return { label: 'إرجاع', class: 'outcome', icon: 'fas fa-arrow-up' };
    }
    if (type === 'transfer_out') {
      return { label: 'تحويل خارجي', class: 'outcome', icon: 'fas fa-arrow-up' };
    }
    if (type === 'transfer_in') {
      return { label: 'تحويل واردة', class: 'income', icon: 'fas fa-arrow-down' };
    }
    return { label: 'معاملة', class: 'transfer', icon: 'fas fa-exchange-alt' };
  }

  // ========== UPDATE STATS ==========
  function updateStats() {
    const total = allTransactions.reduce((s, t) => {
      // المبلغ الموجب للمبيعات والتحويلات الواردة، والمبلغ السالب للإرجاعات
      if (t.type === 'sale' || t.type === 'transfer_in') {
        return s + (parseFloat(t.amount) || 0);
      } else if (t.type === 'refund' || t.type === 'transfer_out') {
        return s - (parseFloat(t.amount) || 0);
      } else if (t.type === 'transfer') {
        // التحويلات العادية (من المحفظة للمشروع) تخصم من الرصيد
        return s - (parseFloat(t.amount) || 0);
      }
      return s;
    }, 0);

    const returnsCount = allTransactions.filter(t => t.type === 'refund').length;
    const totalTransactions = allTransactions.length;

    document.getElementById('totalAmount').textContent = total.toFixed(2);
    document.getElementById('historyCount').textContent = totalTransactions;
  }

  // ========== LOAD WALLET FULL ==========
  async function loadWalletFull() {
    if (!isOnline) {
      showToast('⚠️ لا يوجد اتصال بالإنترنت', 'error');
      return;
    }

    try {
      // 1. جلب الرصيد من جدول wallet
      const { data: walletData, error: walletError } = await sb
        .from('wallet')
        .select('*')
        .limit(1);

      if (walletError) throw walletError;

      let balance = 0;
      if (walletData && walletData.length > 0) {
        walletId = walletData[0].id;
        balance = walletData[0].balance || 0;
        document.getElementById('totalAmount').textContent = balance.toFixed(2);
        document.getElementById('transferAmount').textContent = balance.toFixed(2) + ' درهم';
      } else {
        // إذا لم يوجد سجل، أنشئ واحدا
        const { data: newWallet, error: insertError } = await sb
          .from('wallet')
          .insert({ balance: 0, total_earned: 0, total_transferred: 0 })
          .select()
          .single();

        if (insertError) throw insertError;
        if (newWallet) {
          walletId = newWallet.id;
          document.getElementById('totalAmount').textContent = '0.00';
          document.getElementById('transferAmount').textContent = '0.00 درهم';
        }
      }

      // 2. جلب جميع المعاملات من عدة مصادر
      allTransactions = [];

      // 2.1 جلب تحويلات المحفظة (من wallet_transfers)
      const { data: transfersData, error: transfersError } = await sb
        .from('wallet_transfers')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(50);

      if (!transfersError && transfersData) {
        const transferItems = transfersData.map(t => ({
          id: t.id,
          date: t.created_at,
          type: 'transfer',
          amount: t.amount,
          note: t.note || 'تحويل للمشروع',
          status: t.status,
          ref: t.id
        }));
        allTransactions = allTransactions.concat(transferItems);
      }

      // 2.2 جلب المبيعات من جدول orders (الدخل)
      const { data: salesData, error: salesError } = await sb
        .from('orders')
        .select('id, total, created_at, status, customer_name')
        .eq('status', 'completed')
        .order('created_at', { ascending: false })
        .limit(50);

      if (!salesError && salesData) {
        const saleItems = salesData.map(s => ({
          id: s.id,
          date: s.created_at,
          type: 'sale',
          amount: s.total,
          note: `بيع - ${s.customer_name || 'عميل'}`,
          status: 'completed',
          ref: s.id
        }));
        allTransactions = allTransactions.concat(saleItems);
      }

      // 2.3 جلب عمليات الإرجاع من جدول returns (إن وجد)
      try {
        const { data: returnsData, error: returnsError } = await sb
          .from('returns')
          .select('id, total_refund, created_at, status, reason')
          .eq('status', 'completed')
          .order('created_at', { ascending: false })
          .limit(50);

        if (!returnsError && returnsData) {
          const returnItems = returnsData.map(r => ({
            id: r.id,
            date: r.created_at,
            type: 'refund',
            amount: r.total_refund,
            note: r.reason || 'إرجاع منتج',
            status: 'completed',
            ref: r.id
          }));
          allTransactions = allTransactions.concat(returnItems);
        }
      } catch(e) { /* جدول returns قد لا يكون موجوداً */ }

      // 2.4 ترتيب المعاملات حسب التاريخ (الأحدث أولاً)
      allTransactions.sort((a, b) => new Date(b.date) - new Date(a.date));

      // 2.5 عرض المعاملات في الواجهة
      const historyContainer = document.getElementById('historyContainer');

      if (allTransactions.length > 0) {
        historyContainer.innerHTML = allTransactions.map(t => {
          const typeInfo = getTransactionType(t.type, t.status);
          const isPositive = (t.type === 'sale' || t.type === 'transfer_in');
          const isNegative = (t.type === 'refund' || t.type === 'transfer_out');
          const isTransfer = (t.type === 'transfer');
          
          let amountClass = 'transfer';
          let amountSign = '';
          if (isPositive) { amountClass = 'positive'; amountSign = '+'; }
          else if (isNegative) { amountClass = 'negative'; amountSign = '-'; }
          else if (isTransfer) { amountClass = 'transfer'; amountSign = ''; }

          const statusText = t.status === 'completed' ? '✅ مكتمل' : '⏳ قيد الانتظار';

          return `
            <div class="history-item">
              <span class="h-date">${new Date(t.date).toLocaleString('ar-MA')}</span>
              <span class="h-type ${typeInfo.class}">
                <i class="${typeInfo.icon}"></i> ${typeInfo.label}
              </span>
              <span class="h-amount ${amountClass}">${amountSign}${t.amount.toFixed(2)} درهم</span>
              <span class="h-note">${t.note || '—'}</span>
              <span style="font-size:0.55rem;color:var(--text-dim);">${statusText}</span>
            </div>
          `;
        }).join('');
      } else {
        historyContainer.innerHTML = `
          <div class="history-empty">
            <i class="fas fa-wallet"></i>
            <p>لا توجد معاملات</p>
            <p style="font-size:0.65rem;margin-top:4px;">ستظهر هنا المبيعات والتحويلات</p>
          </div>
        `;
      }

      // تحديث الإحصائيات
      updateStats();

      // 3. جلب أرباح اليوم (من المبيعات فقط)
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const tomorrow = new Date(today);
      tomorrow.setDate(tomorrow.getDate() + 1);

      const { data: todayData, error: todayError } = await sb
        .from('orders')
        .select('total')
        .eq('status', 'completed')
        .gte('created_at', today.toISOString())
        .lt('created_at', tomorrow.toISOString());

      if (!todayError && todayData) {
        const todayProfit = todayData.reduce((s, o) => s + (o.total || 0), 0);
        document.getElementById('walletToday').textContent = todayProfit.toFixed(2);
      }

      // 4. جلب أرباح الشهر (من المبيعات فقط)
      const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
      const { data: monthData, error: monthError } = await sb
        .from('orders')
        .select('total')
        .eq('status', 'completed')
        .gte('created_at', monthStart.toISOString());

      if (!monthError && monthData) {
        const monthProfit = monthData.reduce((s, o) => s + (o.total || 0), 0);
        document.getElementById('walletMonth').textContent = monthProfit.toFixed(2);
      }

      // 5. جلب إجمالي الأرباح (من المبيعات فقط)
      const { data: totalData, error: totalError } = await sb
        .from('orders')
        .select('total')
        .eq('status', 'completed');

      if (!totalError && totalData) {
        const totalProfit = totalData.reduce((s, o) => s + (o.total || 0), 0);
        document.getElementById('walletTotal').textContent = totalProfit.toFixed(2);
      }

    } catch (e) {
      console.error('Error loading wallet:', e);
      showToast('❌ خطأ في تحميل البيانات: ' + e.message, 'error');
    }
  }

  // ========== TRANSFER TO PROJECT ==========
  window.transferToProject = async function() {
    if (!isOnline) {
      showToast('⚠️ لا يوجد اتصال بالإنترنت', 'error');
      return;
    }

    const balanceText = document.getElementById('totalAmount').textContent;
    const currentBalance = parseFloat(balanceText) || 0;
    
    if (currentBalance <= 0) {
      showToast('⚠️ لا يوجد رصيد للتحويل', 'warning');
      return;
    }

    if (!confirm(`💰 هل تريد تحويل ${currentBalance.toFixed(2)} درهم إلى المشروع؟`)) return;

    const btn = document.getElementById('transferBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري...';

    try {
      // 1. إضافة سجل في wallet_transfers
      const { data: transferData, error: transferError } = await sb
        .from('wallet_transfers')
        .insert({
          amount: currentBalance,
          status: 'completed',
          note: 'تحويل من لاكيس إلى المشروع'
        })
        .select()
        .single();

      if (transferError) throw transferError;

      // 2. تحديث الرصيد في wallet
      const { error: updateError } = await sb
        .from('wallet')
        .update({ 
          balance: 0, 
          total_transferred: currentBalance, 
          updated_at: new Date() 
        })
        .eq('id', walletId);

      if (updateError) throw updateError;

      // 3. تحديث الواجهة
      document.getElementById('totalAmount').textContent = '0.00';
      document.getElementById('transferAmount').textContent = '0.00 درهم';
      
      showToast(`✅ تم تحويل ${currentBalance.toFixed(2)} درهم`, 'success');
      
      // 4. إعادة تحميل البيانات
      await loadWalletFull();

    } catch(e) {
      console.error('Transfer error:', e);
      showToast('❌ خطأ: ' + e.message, 'error');
    }

    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-arrow-up"></i> تحويل للمشروع';
  };

  // ========== INIT ==========
  document.addEventListener('DOMContentLoaded', () => {
    if (window.sb) sb = window.sb;
    loadTheme();
    startNetworkMonitoring();
    loadWalletFull();
  });
</script>
