<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <!-- ========== START SEO & META TAGS ========== -->

  <meta name="keywords" content="مرنيسة, تاونات, منتجات محلية, زيت الزيتون, عسل, حرف يدوية, سوق إلكتروني, المغرب">
  <meta property="og:title" content="MarnissaMall | أول سوق إلكتروني في مرنيسة قرية">
  <meta property="og:description" content="تسوق منتجات مرنيسة الأصلية - زيت الزيتون، عسل جبلي، حرف يدوية ومنتجات تقليدية بجودة عالية">
  <meta property="og:image" content="images/logo.png">

  <link rel="canonical" href="https://marnissamall.ma/product.html">
  <link rel="icon" href="images/logo.png" type="image/png">
  <!-- ========== END SEO & META TAGS ========== -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MarnissaMall – المنتجات</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    /* ========== الألوان الأساسية المتناسقة ========== */
    :root {
      --blue-primary: #0057b3;
      --blue-dark: #003d80;
      --blue-light: #3a8fd4;
      --black: #0a0a0a;
      --black-light: #0d1117;
      --gray: #161b22;
      --text-light: #ffffff;
      --text-muted: #c9d1d9;
      --text-dim: #8b949e;
      --gold: #C4A06A;
      --success: #25D366;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    
    /* ========== الوضع الداكن (أسود + أزرق) ========== */
    body {
      --bg: #0a0a0a;
      --bg2: #0d1117;
      --text: #ffffff;
      --text-muted: #c9d1d9;
      --text-dim: #8b949e;
      --border: rgba(0,87,179,0.35);
      --border2: rgba(0,87,179,0.5);
      --card: rgba(13,17,23,0.85);
      --card-hover: rgba(0,87,179,0.2);
    }
    
    /* ========== الوضع الفاتح (أزرق فاتح) ========== */
    body.blue-theme {
      --bg: #e8f0fe;
      --bg2: #ffffff;
      --text: #0a0a0a;
      --text-muted: #1a3a5c;
      --text-dim: #4a6a8c;
      --border: rgba(0,87,179,0.2);
      --border2: rgba(0,87,179,0.3);
      --card: rgba(255,255,255,0.9);
      --card-hover: rgba(0,87,179,0.1);
    }
    
    body {
      background: var(--bg);
      font-family: 'Tajawal', sans-serif;
      color: var(--text);
      scroll-behavior: smooth;
      overflow-x: hidden;
      transition: background-color 0.5s ease, color 0.5s ease;
    }
    
    .darija-text { font-family: 'Tajawal', sans-serif; }
    
    /* ========== SECTION TITLES ========== */
    .section-title {
      position: relative;
      display: inline-block;
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      font-weight: 800;
    }
    .section-title::after {
      content: '';
      position: absolute;
      bottom: -10px;
      right: 0;
      width: 60px;
      height: 3px;
      background: var(--blue-primary);
      border-radius: 2px;
    }
    .section-title-center::after {
      left: 50%;
      transform: translateX(-50%);
    }
    
    /* ========== HERO BANNER ========== */
    .hero-banner {
      background: linear-gradient(135deg, var(--black), var(--black-light));
      padding: 2.5rem 2rem;
      border-radius: 16px;
      margin-bottom: 2rem;
      color: white;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    
    .hero-banner::before {
      content: '🛍️';
      position: absolute;
      font-size: 8rem;
      opacity: 0.05;
      bottom: -20px;
      left: -20px;
    }
    
    .hero-banner h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 900;
    }
    .hero-banner p { opacity: 0.9; font-size: 1.1rem; }
    
    /* ========== CATEGORIES GRID ========== */
    .categories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    
    .category-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.2rem 0.8rem;
      text-align: center;
      transition: all 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }
    
    .category-card:hover {
      transform: translateY(-4px);
      border-color: var(--blue-primary);
      box-shadow: 0 8px 24px rgba(0,87,179,0.15);
    }
    
    .category-card .category-image {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 0.5rem;
      border: 2px solid var(--border);
      transition: all 0.3s ease;
      background: var(--gray);
    }
    
    .category-card:hover .category-image {
      border-color: var(--blue-primary);
      transform: scale(1.05);
    }
    
    .category-card .icon {
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
      display: block;
    }
    
    .category-card .name {
      font-weight: 600;
      font-size: 0.85rem;
    }
    
    .category-card .count {
      font-size: 0.65rem;
      color: var(--text-dim);
    }
    
    .category-card.active {
      border-color: var(--blue-primary);
      background: rgba(0,87,179,0.1);
    }
    
    /* ========== SUB-CATEGORIES ========== */
    .sub-categories {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 1rem 0 2rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
    }
    
    .sub-category-link {
      padding: 0.3rem 1rem;
      border-radius: 20px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.75rem;
      text-decoration: none;
      transition: all 0.3s;
      cursor: pointer;
    }
    
    .sub-category-link:hover {
      border-color: var(--blue-primary);
      color: var(--blue-primary);
    }
    
    .sub-category-link.active {
      background: var(--blue-primary);
      color: white;
      border-color: var(--blue-primary);
    }
    
    /* ========== PRODUCT CARD ========== */
    .product-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      height: 100%;
      position: relative;
      box-shadow: var(--shadow);
    }
    
    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      border-color: var(--blue-primary);
    }
    
    .product-card .img-wrap {
      width: 100%;
      aspect-ratio: 1/1;
      border-radius: 8px;
      overflow: hidden;
      background: var(--gray);
      margin-bottom: 0.75rem;
      position: relative;
    }
    
    .product-card .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: white;
      padding: 0.5rem;
      transition: transform 0.4s;
    }
    
    .product-card:hover .img-wrap img { transform: scale(1.05); }
    
    .product-card .badge {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      background: #ff4757;
      color: white;
    }
    
    .product-card .badge.best-seller { background: var(--gold); color: #111; }
    .product-card .badge.new { background: var(--success); color: white; }
    
    .product-card .rating {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin: 0.25rem 0;
    }
    
    .product-card .rating .stars { color: var(--gold); }
    
    .product-card .title {
      font-weight: 700;
      font-size: 0.95rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 0.25rem;
      color: var(--text);
      text-decoration: none;
    }
    
    .product-card .title:hover { color: var(--blue-primary); }
    
    .product-card .price {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--text);
      margin: 0.3rem 0;
    }
    
    .product-card .price .currency { font-size: 0.8rem; }
    
    .product-card .old-price {
      font-size: 0.8rem;
      color: var(--text-dim);
      text-decoration: line-through;
      margin-right: 0.5rem;
    }
    
    .product-card .installments {
      font-size: 0.7rem;
      color: var(--text-dim);
    }
    
    .product-card .installments span { color: var(--success); }
    
    .product-card .stock-status {
      font-size: 0.7rem;
      margin: 0.25rem 0;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    
    .product-card .stock-status.in { color: var(--success); }
    .product-card .stock-status.low { color: #ffa502; }
    .product-card .stock-status.out { color: #ff4757; }
    
    .product-card .actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
      flex-wrap: wrap;
    }
    
    .product-card .actions .btn {
      padding: 0.5rem 0.8rem;
      border-radius: 8px;
      border: none;
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      flex: 1;
    }
    
    .product-card .actions .btn-primary {
      background: var(--blue-primary);
      color: white;
    }
    
    .product-card .actions .btn-primary:hover {
      background: var(--blue-dark);
      transform: scale(1.02);
    }
    
    .product-card .actions .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    
    .product-card .actions .btn-outline:hover {
      border-color: var(--blue-primary);
      color: var(--blue-primary);
    }
    
    .product-card .actions .btn-whatsapp {
      background: var(--success);
      color: white;
      flex: 0.5;
    }
    
    .product-card .actions .btn-whatsapp:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }
    
    .product-card .actions .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    .product-card .free-shipping {
      font-size: 0.65rem;
      color: var(--success);
      margin-top: 0.25rem;
    }
    
    /* ===== FILTER BAR ===== */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
      align-items: center;
      background: var(--card);
      border-radius: 12px;
      padding: 0.8rem 1.2rem;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      direction: rtl;
    }
    
    .filter-bar select,
    .filter-bar input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 1rem;
      color: var(--text);
      font-family: inherit;
      font-size: 0.8rem;
      outline: none;
      transition: 0.3s;
      flex: 1 1 140px;
      min-width: 120px;
      direction: rtl;
    }
    
    .filter-bar select:focus,
    .filter-bar input:focus {
      border-color: var(--blue-primary);
      box-shadow: 0 0 0 3px rgba(0,87,179,0.1);
    }
    
    .filter-bar input::placeholder { color: var(--text-dim); }
    
    .filter-bar .reset-btn {
      background: transparent;
      border: 1px solid var(--blue-primary);
      color: var(--blue-primary);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      transition: all 0.3s;
      white-space: nowrap;
      flex: 0 0 auto;
    }
    
    .filter-bar .reset-btn:hover {
      background: var(--blue-primary);
      color: white;
    }
    
    /* ===== PAGINATION ===== */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 2rem;
      flex-wrap: wrap;
    }
    
    .pagination button {
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      transition: 0.3s;
      font-family: inherit;
    }
    
    .pagination button:hover { border-color: var(--blue-primary); }
    .pagination button.active {
      background: var(--blue-primary);
      color: white;
      border-color: var(--blue-primary);
    }
    
    /* ===== LOADER ===== */
    .loader-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--border);
      border-radius: 50%;
      border-top-color: var(--blue-primary);
      animation: spin 0.8s linear infinite;
      margin: 3rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* ===== TOAST ===== */
    .toast-msg {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.8rem 1.5rem;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      z-index: 3000;
      opacity: 0;
      transition: all 0.35s;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
      max-width: 90vw;
    }
    
    .toast-msg.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast-msg.success { border-color: var(--success); color: var(--success); }
    .toast-msg.error { border-color: #ff4757; color: #ff4757; }
    
    /* ===== WHATSAPP FLOAT ===== */
    .whatsapp-float {
      position: fixed;
      bottom: 30px;
      left: 30px;
      z-index: 100;
      background: #25D366;
      color: white;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      font-size: 1.5rem;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(37,211,102,0.4);
    }
    
    .whatsapp-float:hover { transform: scale(1.08); }
    
    /* ========== RESPONSIVE ========== */
    @media (max-width: 768px) {
      body { padding-top: 70px; }
      .hero-banner { padding: 1.5rem; }
      .hero-banner::before { font-size: 4rem; }
      .categories-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
      .category-card { padding: 0.8rem 0.5rem; }
      .category-card .category-image { width: 60px; height: 60px; }
      .whatsapp-float { width: 44px; height: 44px; font-size: 1.2rem; bottom: 20px; left: 20px; }
    }
    
    @media (max-width: 640px) {
      .product-card .actions .btn { font-size: 0.65rem; padding: 0.4rem 0.6rem; }
      .filter-bar { flex-direction: column; }
      .filter-bar select,
      .filter-bar input { flex: 1; width: 100%; }
      .filter-bar .reset-btn { flex: 1 1 100%; text-align: center; }
      .categories-grid { grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
    }
    
    @media (max-width: 400px) {
      .categories-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <!-- ===== HEADER (injected by header.js) ===== -->

  <a href="https://wa.me/212612345678" target="_blank" class="whatsapp-float" aria-label="واتساب">

  <!-- ===== MAIN ===== -->
  <main class="page-wrap" style="max-width: 1200px; margin: 0 auto; padding: 1rem;">
    
    <!-- ===== HERO BANNER ===== -->
    <div class="hero-banner" data-aos="fade-down">
      <div class="flex flex-col md:flex-row justify-between items-center">
        <div>
          <h1 class="darija-text">اكتشف أفضل العروض 🎯</h1>

    <!-- ===== CATEGORIES SECTION ===== -->
    <section data-aos="fade-up">
      <div class="flex justify-between items-center mb-4">
        <h2 class="section-title darija-text">📂 التصنيفات</h2>
      </div>
      
      <!-- Categories Grid -->
      <div class="categories-grid" id="categoriesGrid">
        <div class="col-span-full flex justify-center py-8">

      <!-- Sub-Categories -->
      <div class="sub-categories" id="subCategoriesContainer">
        <span class="text-sm font-bold" style="color:var(--text-dim);">التصنيفات الفرعية:</span>
        <a href="#" class="sub-category-link active" onclick="filterBySubCategory(null); return false;">الكل</a>

    <!-- ===== FILTER BAR ===== -->
    <div class="filter-bar darija-text">
      <select id="categoryFilter">
        <option value="">📂 كل التصنيفات</option>
      </select>
      <select id="sortFilter">
        <option value="popular">⭐ الأكثر مبيعاً</option>
        <option value="newest">🆕 الأحدث</option>
        <option value="price-low">💰 السعر: من الأقل</option>
        <option value="price-high">💰 السعر: من الأكثر</option>
        <option value="rating">🏆 أعلى تقييم</option>
      </select>
      <select id="priceRange">
        <option value="">💰 كل الأسعار</option>
        <option value="0-100">أقل من 100 درهم</option>
        <option value="100-500">100 - 500 درهم</option>
        <option value="500-1000">500 - 1000 درهم</option>

        <i class="fas fa-undo"></i> مسح الفلترة

    <!-- ===== PRODUCTS GRID ===== -->
    <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6">
      <div class="loader-spinner" style="grid-column:1/-1;"></div>

    <!-- ===== PAGINATION ===== -->

  <!-- ===== FOOTER (injected by footer.js) ===== -->

  <div class="toast-msg" id="toastMsg"></div>

  <!-- ========== SCRIPTS ========== -->
  <script src="header.js"></script>
  <script src="footer.js"></script>

  <script>
    AOS.init({ duration: 600, once: true });

    // ===== CONFIG =====
    let allProducts = [];
    let allCategories = [];
    let categoriesMap = {};
    let currentPage = 1;
    const itemsPerPage = 12;
    let currentCategoryId = null;
    let currentSubCategoryId = null;

    // ===== THEME =====
    function toggleTheme() {
      document.body.classList.toggle('blue-theme');
      const icon = document.querySelector('.theme-toggle-btn i') || document.getElementById('themeIcon');
      if (document.body.classList.contains('blue-theme')) {
        if (icon) icon.className = 'fas fa-sun';
      } else {
        if (icon) icon.className = 'fas fa-moon';
      }
      localStorage.setItem('theme', document.body.classList.contains('blue-theme') ? 'blue' : 'dark');
    }

    // Load saved theme
    if (localStorage.getItem('theme') === 'blue') {
      document.body.classList.add('blue-theme');
      const icon = document.querySelector('.theme-toggle-btn i') || document.getElementById('themeIcon');
      if (icon) icon.className = 'fas fa-sun';
    }

    // ===== READ URL PARAMETERS =====
    function getUrlParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        category: params.get('category'),
        subCategory: params.get('subCategory'),
        search: params.get('search')
      };
    }

    // ===== FETCH CATEGORIES =====
    async function fetchCategories() {
      try {
        const { data: categories, error } = await window.sb
          .from('categories')
          .select('*')
          .order('name', { ascending: true });

        if (error) throw error;
        
        allCategories = categories || [];
        renderCategories(categories);
        renderSubCategories(categories);
        populateCategoryFilter(categories);
        
        return categories;
      } catch (error) {
        console.error('❌ خطأ في جلب التصنيفات:', error);
        document.getElementById('categoriesGrid').innerHTML = `
          <div class="col-span-full text-center py-4">
            <i class="fas fa-exclamation-circle text-2xl opacity-30"></i>
            <p class="text-sm darija-text">${error.message || 'مشكل في تحميل التصنيفات'}</p>
          </div>
        `;
        return [];
      }
    }

    // ===== GET CATEGORY IMAGE =====
    function getCategoryImage(category) {
      // إذا كانت الصورة موجودة في قاعدة البيانات
      if (category.image) {
        // تحقق إذا كان الرابط كاملاً (يبدأ بـ http) أو من Supabase Storage
        if (category.image.startsWith('http')) {
          return category.image;
        } else {
          // افتراض أن الصورة مخزنة في Supabase Storage
          const supabaseUrl = window.MARNISSA_CONFIG?.SUPABASE_URL || '';
          const bucket = window.MARNISSA_CONFIG?.STORAGE_BUCKET || 'categories';
          return `${supabaseUrl}/storage/v1/object/public/${bucket}/${category.image}`;
        }
      }
      // صورة افتراضية حسب اسم الفئة
      const defaultImages = {
        'منتجات غذائية': 'https://images.unsplash.com/photo-1591077732851-4adf8a1ad0a9?w=200&h=200&fit=crop',
        'حرف يدوية': 'https://images.unsplash.com/photo-1585687348668-5b285970d5f7?w=200&h=200&fit=crop',
        'منتجات تجميلية': 'https://images.unsplash.com/photo-1596462502278-3bf7241a8b0f?w=200&h=200&fit=crop',
        'ملابس تقليدية': 'https://images.unsplash.com/photo-1539008835657-9e8e9680c956?w=200&h=200&fit=crop',
        'منتجات فلاحية': 'https://images.unsplash.com/photo-1464226184884-fa280b87c399?w=200&h=200&fit=crop',
        'مشروبات تقليدية': 'https://images.unsplash.com/photo-1556881286-fc6915169721?w=200&h=200&fit=crop'
      };
      return defaultImages[category.name] || 'https://placehold.co/200x200/0a0a0a/0057b3?text=' + encodeURIComponent(category.name);
    }

    // ===== RENDER CATEGORIES =====
    function renderCategories(categories) {
      const grid = document.getElementById('categoriesGrid');
      if (!categories || categories.length === 0) {
        grid.innerHTML = `
          <div class="col-span-full text-center py-8">
            <i class="fas fa-folder-open text-3xl opacity-30"></i>
            <p class="mt-2 darija-text">لا توجد تصنيفات</p>
          </div>
        `;
        return;
      }

      // Get only parent categories (where parent_id is null)
      const parentCategories = categories.filter(c => !c.parent_id);
      
      // Show max 6 categories
      const displayCategories = parentCategories.slice(0, 6);

      // Get category from URL
      const urlParams = getUrlParams();
      const selectedCategoryId = urlParams.category;

      grid.innerHTML = displayCategories.map((cat, i) => {
        const productCount = allProducts.filter(p => p.category_id === cat.id).length;
        const isActive = selectedCategoryId === cat.id;
        const imageUrl = getCategoryImage(cat);
        
        return `
          <div class="category-card ${isActive ? 'active' : ''}" 
               data-category-id="${cat.id}" 
               onclick="filterByCategory('${cat.id}'); return false;">
            <img src="${imageUrl}" alt="${escapeHtml(cat.name)}" 
                 class="category-image" 
                 loading="lazy"
                 onerror="this.src='https://placehold.co/200x200/0a0a0a/0057b3?text=${encodeURIComponent(cat.name)}'">
            <div class="name darija-text">${escapeHtml(cat.name)}</div>
            <div class="count">${productCount} منتج</div>
          </div>
        `;
      }).join('');
    }

    // ===== RENDER SUB-CATEGORIES =====
    function renderSubCategories(categories, parentId = null) {
      const container = document.getElementById('subCategoriesContainer');
      if (!container) return;

      // If parentId is not provided, try to get it from URL
      if (!parentId) {
        const urlParams = getUrlParams();
        parentId = urlParams.category || null;
      }

      // Get sub-categories (where parent_id is not null)
      let subCats = categories.filter(c => c.parent_id);
      
      // If parentId is provided, filter sub-categories by parent
      if (parentId) {
        subCats = subCats.filter(c => c.parent_id === parentId);
      }

      // Keep the title
      const title = container.querySelector('span');
      
      let html = title.outerHTML;
      html += `<a href="#" class="sub-category-link active" onclick="filterBySubCategory(null); return false;">الكل</a>`;
      
      if (subCats.length > 0) {
        html += subCats.slice(0, 10).map(cat => `
          <a href="#" class="sub-category-link" data-sub-id="${cat.id}" onclick="filterBySubCategory('${cat.id}'); return false;">
            ${escapeHtml(cat.name)}
          </a>
        `).join('');
      } else {
        html += `<span class="text-xs" style="color:var(--text-dim);">لا توجد تصنيفات فرعية</span>`;
      }
      
      container.innerHTML = html;
    }

    // ===== POPULATE CATEGORY FILTER =====
    function populateCategoryFilter(categories) {
      const select = document.getElementById('categoryFilter');
      if (!select) return;
      
      const parentCats = categories.filter(c => !c.parent_id);
      select.innerHTML = `<option value="">📂 كل التصنيفات</option>` + 
        parentCats.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
      
      // Set selected value from URL
      const urlParams = getUrlParams();
      if (urlParams.category) {
        select.value = urlParams.category;
      }
    }

    // ===== FETCH PRODUCTS =====
    async function fetchProducts() {
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = `<div class="loader-spinner" style="grid-column:1/-1;"></div>`;

      try {
        let query = window.sb
          .from('products')
          .select('*')
          .eq('is_available', true);

        // Filter by category if selected
        if (currentCategoryId) {
          query = query.eq('category_id', currentCategoryId);
        }

        // Filter by sub-category if selected
        if (currentSubCategoryId) {
          query = query.eq('category_id', currentSubCategoryId);
        }

        const { data: products, error } = await query.order('created_at', { ascending: false });

        if (error) throw error;

        allProducts = products || [];
        renderProducts(allProducts);
        updateCartCount();

        // Update category counts
        if (allCategories.length > 0) {
          renderCategories(allCategories);
        }

      } catch (error) {
        console.error('❌ خطأ:', error);
        grid.innerHTML = `
          <div class="col-span-full text-center py-12">
            <i class="fas fa-exclamation-circle text-4xl opacity-30"></i>
            <p class="mt-2 darija-text">${error.message || 'مشكل فالاتصال'}</p>
            <button onclick="fetchProducts()" class="mt-4 px-6 py-2 rounded-lg darija-text" style="background:var(--blue-primary);color:white;border:none;cursor:pointer;font-weight:bold;">
              <i class="fas fa-sync"></i> حاول مرة أخرى
            </button>
          </div>
        `;
      }
    }

    // ===== RENDER PRODUCTS =====
    function renderProducts(products) {
      const grid = document.getElementById('productsGrid');

      if (!products || products.length === 0) {
        grid.innerHTML = `
          <div class="col-span-full text-center py-12">
            <i class="fas fa-box-open text-4xl opacity-30"></i>
            <p class="mt-2 darija-text">ما كاين حتى منتج مكايل لبحث ديالك</p>
          </div>
        `;
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      // Pagination
      const totalPages = Math.ceil(products.length / itemsPerPage);
      const start = (currentPage - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageItems = products.slice(start, end);

      grid.innerHTML = pageItems.map((p, i) => {
        const stockStatus = getStockStatus(p);
        const imgUrl = (p.images && p.images[0]) || 'https://placehold.co/400x400/f0f2f2/0057b3?text=' + encodeURIComponent(p.name);
        const categoryName = categoriesMap[p.category_id] || 'منتج';
        const salePercent = p.old_price ? Math.round((1 - p.price / p.old_price) * 100) : 0;
        const rating = p.rating_avg || 0;
        const isBestSeller = (p.orders_count || 0) > 10;

        return `
          <div class="product-card" data-aos="fade-up" data-aos-delay="${(i % 8) * 30}">
            <div class="img-wrap">
              <img src="${imgUrl}" alt="${escapeHtml(p.name)}" loading="lazy" onerror="this.src='https://placehold.co/400x400/f0f2f2/0057b3?text=📦'">
              ${salePercent > 0 ? `<span class="badge">-${salePercent}%</span>` : ''}
              ${isBestSeller ? `<span class="badge best-seller" style="top:8px;left:8px;right:auto;">🏆 الأكثر مبيعاً</span>` : ''}
            </div>
            
            <a href="product-detail.html?id=${p.id}" class="title darija-text">${escapeHtml(p.name)}</a>
            
            <div class="rating">
              <span class="stars">${'★'.repeat(Math.round(rating))}${'☆'.repeat(5 - Math.round(rating))}</span>
              <span>${rating.toFixed(1)}</span>
              <span style="color:var(--text-dim);">(${p.rating_count || 0})</span>
            </div>
            
            <div class="price darija-text">
              ${Number(p.price).toFixed(2)} <span class="currency">درهم</span>
              ${p.old_price ? `<span class="old-price">${p.old_price} درهم</span>` : ''}
            </div>
            
            ${p.old_price ? `<div class="installments darija-text">أو <span>${Math.round(p.price / 3)} درهم</span> على 3 دفعات</div>` : ''}
            
            <div class="stock-status ${stockStatus.cls} darija-text">
              <i class="fas ${stockStatus.icon}"></i> ${stockStatus.label}
            </div>
            
            ${p.price > 200 ? `<div class="free-shipping darija-text"><i class="fas fa-truck"></i> شحن مجاني</div>` : ''}
            
            <div class="actions">
              <a href="product-detail.html?id=${p.id}" class="btn btn-outline darija-text">
                <i class="fas fa-eye"></i> تفاصيل
              </a>
              ${p.stock > 0 ? `
                <button class="btn btn-primary darija-text add-to-cart" 
                        data-id="${p.id}" 
                        data-name="${escapeHtml(p.name)}" 
                        data-price="${p.price}" 
                        data-image="${imgUrl}" 
                        data-stock="${p.stock}">
                  <i class="fas fa-cart-plus"></i> سلة
                </button>
                <a href="https://wa.me/212612345678?text=${encodeURIComponent('سلام، بغيت نزيد معلومات على: ' + p.name)}" 
                   target="_blank" class="btn btn-whatsapp darija-text">
                  <i class="fab fa-whatsapp"></i>
                </a>
              ` : `
                <button class="btn btn-outline darija-text" disabled>
                  <i class="fas fa-ban"></i> نفذ
                </button>
              `}
            </div>
          </div>
        `;
      }).join('');

      // Pagination
      renderPagination(totalPages);

      // Add to cart listeners
      document.querySelectorAll('.add-to-cart').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.preventDefault();
          const id = this.dataset.id;
          const name = this.dataset.name;
          const price = parseFloat(this.dataset.price);
          const image = this.dataset.image;
          const stock = parseInt(this.dataset.stock);

          let cart = JSON.parse(localStorage.getItem('marnissaCart')) || [];
          const existing = cart.find(item => item.id === id && !item.variants);

          if (existing) {
            if (existing.qty + 1 > stock) {
              showToast('⚠️ الكمية المطلوبة أكبر من المخزون', 'error');
              return;
            }
            existing.qty += 1;
          } else {
            cart.push({ id, name, price, image, stock, qty: 1, sku: null, variants: null, uniqueId: id });
          }

          localStorage.setItem('marnissaCart', JSON.stringify(cart));
          updateCartCount();
          showToast('✅ تمت الإضافة للسلة', 'success');
        });
      });
    }

    // ===== PAGINATION =====
    function renderPagination(totalPages) {
      const container = document.getElementById('pagination');
      if (totalPages <= 1) { container.innerHTML = ''; return; }

      let html = '';
      for (let i = 1; i <= totalPages; i++) {
        html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
      }
      container.innerHTML = html;
    }

    function goToPage(page) {
      currentPage = page;
      const filtered = getFilteredProducts();
      renderProducts(filtered);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ===== FILTERS =====
    function getFilteredProducts() {
      const searchInput = document.getElementById('searchInput');
      const searchVal = searchInput ? searchInput.value.trim().toLowerCase() : '';
      const category = document.getElementById('categoryFilter').value;
      const sort = document.getElementById('sortFilter').value;
      const priceRange = document.getElementById('priceRange').value;

      let filtered = allProducts.filter(p => {
        const matchSearch = p.name.toLowerCase().includes(searchVal) || 
                           (p.description && p.description.toLowerCase().includes(searchVal));
        const matchCat = category === '' || p.category_id === category;

        let matchPrice = true;
        if (priceRange) {
          const [min, max] = priceRange.split('-').map(Number);
          matchPrice = p.price >= min && p.price <= max;
        }

        return matchSearch && matchCat && matchPrice;
      });

      switch(sort) {
        case 'price-low': filtered.sort((a,b) => a.price - b.price); break;
        case 'price-high': filtered.sort((a,b) => b.price - a.price); break;
        case 'popular': filtered.sort((a,b) => (b.orders_count || 0) - (a.orders_count || 0)); break;
        case 'rating': filtered.sort((a,b) => (b.rating_avg || 0) - (a.rating_avg || 0)); break;
        default: filtered.sort((a,b) => new Date(b.created_at) - new Date(a.created_at)); break;
      }

      return filtered;
    }

    function performSearch() {
      currentPage = 1;
      const filtered = getFilteredProducts();
      renderProducts(filtered);
    }

    function resetFilters() {
      const searchInput = document.getElementById('searchInput');
      if (searchInput) searchInput.value = '';
      document.getElementById('categoryFilter').value = '';
      document.getElementById('sortFilter').value = 'popular';
      document.getElementById('priceRange').value = '';
      currentCategoryId = null;
      currentSubCategoryId = null;
      currentPage = 1;
      
      // Reset sub-category links
      document.querySelectorAll('.sub-category-link').forEach(el => el.classList.remove('active'));
      const firstLink = document.querySelector('.sub-category-link');
      if (firstLink) firstLink.classList.add('active');
      
      // Update URL without category parameter
      const url = new URL(window.location);
      url.searchParams.delete('category');
      url.searchParams.delete('subCategory');
      window.history.pushState({}, '', url);
      
      // Update categories active state
      document.querySelectorAll('.category-card').forEach(el => el.classList.remove('active'));
      
      fetchProducts();
    }

    // ===== FILTER BY CATEGORY =====
    function filterByCategory(categoryId) {
      currentCategoryId = categoryId;
      currentSubCategoryId = null;
      currentPage = 1;
      
      // Update URL
      const url = new URL(window.location);
      if (categoryId) {
        url.searchParams.set('category', categoryId);
        url.searchParams.delete('subCategory');
      } else {
        url.searchParams.delete('category');
        url.searchParams.delete('subCategory');
      }
      window.history.pushState({}, '', url);
      
      // Update active state
      document.querySelectorAll('.category-card').forEach(el => {
        el.classList.toggle('active', el.dataset.categoryId === categoryId);
      });
      
      // Update sub-categories
      if (allCategories.length > 0) {
        renderSubCategories(allCategories, categoryId);
      }
      
      // Update filter dropdown
      document.getElementById('categoryFilter').value = categoryId || '';
      
      fetchProducts();
    }

    // ===== FILTER BY SUB-CATEGORY =====
    function filterBySubCategory(subCategoryId) {
      currentSubCategoryId = subCategoryId;
      currentPage = 1;
      
      // Update URL
      const url = new URL(window.location);
      if (subCategoryId) {
        url.searchParams.set('subCategory', subCategoryId);
      } else {
        url.searchParams.delete('subCategory');
      }
      window.history.pushState({}, '', url);
      
      // Update active state
      document.querySelectorAll('.sub-category-link').forEach(el => {
        el.classList.toggle('active', el.dataset.subId === subCategoryId);
      });
      
      fetchProducts();
    }

    // ===== HELPERS =====
    function getStockStatus(p) {
      if (!p.is_available || p.stock <= 0) return { cls: 'out', icon: 'fa-times-circle', label: 'غير متوفر' };
      if (p.stock <= 5) return { cls: 'low', icon: 'fa-exclamation-triangle', label: `${p.stock} قطع متبقية` };
      return { cls: 'in', icon: 'fa-check-circle', label: 'متوفر' };
    }

    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem('marnissaCart')) || [];
      const count = cart.reduce((sum, item) => sum + item.qty, 0);
      
      const cartCountElem = document.getElementById('cartCountHeader');
      if (cartCountElem) {
        cartCountElem.textContent = count;
      }
    }

    function escapeHtml(s) {
      if (!s) return '';
      return String(s).replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
    }

    function showToast(text, type) {
      const toast = document.getElementById('toastMsg');
      toast.textContent = text;
      toast.className = `toast-msg ${type} show`;
      clearTimeout(window._toastTimer);
      window._toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ===== EXPOSE FUNCTIONS =====
    window.filterByCategory = filterByCategory;
    window.filterBySubCategory = filterBySubCategory;
    window.goToPage = goToPage;
    window.performSearch = performSearch;
    window.resetFilters = resetFilters;
    window.toggleTheme = toggleTheme;

    // ===== EVENT LISTENERS =====
    document.addEventListener('DOMContentLoaded', async () => {
      if (!window.sb) {
        document.getElementById('productsGrid').innerHTML = `
          <div class="col-span-full text-center py-12">
            <i class="fas fa-exclamation-circle text-4xl opacity-30"></i>
            <p class="mt-2 darija-text">مشكل فتهيئة قاعدة البيانات. تأكد من ملف config.js</p>
          </div>
        `;
        return;
      }

      // Build categories map
      const categories = await fetchCategories();
      if (categories) {
        categories.forEach(cat => categoriesMap[cat.id] = cat.name);
      }

      // Check URL parameters
      const urlParams = getUrlParams();
      if (urlParams.category) {
        currentCategoryId = urlParams.category;
        document.getElementById('categoryFilter').value = urlParams.category;
        // Highlight active category
        setTimeout(() => {
          document.querySelectorAll('.category-card').forEach(el => {
            el.classList.toggle('active', el.dataset.categoryId === urlParams.category);
          });
        }, 100);
      }

      await fetchProducts();

      const searchInput = document.getElementById('searchInput');
      if (searchInput) {
        searchInput.addEventListener('keyup', (e) => {
          if (e.key === 'Enter') performSearch();
        });
        searchInput.addEventListener('input', function() {
          clearTimeout(this._timer);
          this._timer = setTimeout(performSearch, 400);
        });
      }
      
      document.getElementById('categoryFilter').addEventListener('change', () => {
        currentCategoryId = document.getElementById('categoryFilter').value || null;
        currentSubCategoryId = null;
        currentPage = 1;
        // Update sub-categories
        if (allCategories.length > 0) {
          renderSubCategories(allCategories, currentCategoryId);
        }
        // Update URL
        const url = new URL(window.location);
        if (currentCategoryId) {
          url.searchParams.set('category', currentCategoryId);
          url.searchParams.delete('subCategory');
        } else {
          url.searchParams.delete('category');
          url.searchParams.delete('subCategory');
        }
        window.history.pushState({}, '', url);
        fetchProducts();
      });
      
      document.getElementById('sortFilter').addEventListener('change', () => {
        currentPage = 1;
        const filtered = getFilteredProducts();
        renderProducts(filtered);
      });
      
      document.getElementById('priceRange').addEventListener('change', () => {
        currentPage = 1;
        const filtered = getFilteredProducts();
        renderProducts(filtered);
      });

      // Handle browser back/forward
      window.addEventListener('popstate', () => {
        const params = getUrlParams();
        if (params.category) {
          currentCategoryId = params.category;
          document.getElementById('categoryFilter').value = params.category;
        } else {
          currentCategoryId = null;
          document.getElementById('categoryFilter').value = '';
        }
        if (params.subCategory) {
          currentSubCategoryId = params.subCategory;
        } else {
          currentSubCategoryId = null;
        }
        currentPage = 1;
        if (allCategories.length > 0) {
          renderSubCategories(allCategories, currentCategoryId);
        }
        fetchProducts();
      });
    });
  </script>

</body>
</html>
