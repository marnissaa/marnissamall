<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>تفاصيل المنتج | MarnissaMall</title>
  <link rel="icon" href="images/logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    /* ========== نفس الألوان ديال index.html ========== */
    :root {
      --blue-primary:#0057b3;
      --blue-dark:#003d80;
      --blue-light:#3a8fd4;
      --black:#0a0a0a;
      --black-light:#0d1117;
      --success:#25D366;
      --danger:#ff4757;
      --warning:#ffa502;
    }

    /* الوضع الداكن (الافتراضي) */
    body {
      --bg:#0a0a0a;
      --bg2:#0d1117;
      --gray:#161b22;
      --text:#ffffff;
      --text-muted:#c9d1d9;
      --text-dim:#8b949e;
      --border:rgba(0,87,179,0.35);
      --border2:rgba(0,87,179,0.5);
      --card:rgba(13,17,23,0.85);
    }

    /* الوضع الفاتح (كيتبدل من زر الثيم فالفوتر) */
    body.blue-theme {
      --bg:#e8f0fe;
      --bg2:#ffffff;
      --gray:#f0f4fa;
      --text:#0a0a0a;
      --text-muted:#1a3a5c;
      --text-dim:#4a6a8c;
      --border:rgba(0,87,179,0.2);
      --border2:rgba(0,87,179,0.3);
      --card:rgba(255,255,255,0.9);
    }

    body {
      background:var(--bg);
      font-family:'Tajawal','Cairo',sans-serif;
      color:var(--text);
      transition:background-color .5s ease, color .5s ease;
    }

    .darija-text{font-family:'Tajawal','Cairo',sans-serif;}

    /* ===== أزرار عامة (نفس ستايل index.html) ===== */
    .gold-btn{
      background:transparent;border:1.5px solid var(--blue-primary);color:var(--text);
      letter-spacing:1px;font-weight:600;position:relative;overflow:hidden;
      transition:all .4s;cursor:pointer;border-radius:50px;
    }
    .gold-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
      background:linear-gradient(90deg,transparent,rgba(0,87,179,0.2),transparent);transition:left .5s;}
    .gold-btn:hover::before{left:100%;}
    .gold-btn:hover{transform:translateY(-2px);border-color:var(--blue-light);color:var(--blue-light);}
    .gold-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

    .whatsapp-float{
      position:fixed;bottom:30px;left:30px;z-index:100;background:#25D366;color:white;
      width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      transition:all .3s;font-size:1.5rem;text-decoration:none;
    }
    .whatsapp-float:hover{transform:scale(1.08);}

    .page-wrap{max-width:1200px;margin:0 auto;padding:clamp(20px,4vh,40px) 1.5rem clamp(50px,8vh,90px);}

    .loader-spinner{
      width:50px;height:50px;border:4px solid var(--border);border-radius:50%;
      border-top-color:var(--blue-primary);animation:spin .8s linear infinite;margin:3rem auto;
    }
    @keyframes spin{to{transform:rotate(360deg);}}

    .toast-msg{
      position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);
      background:var(--bg2);border:1px solid var(--blue-primary);border-radius:12px;
      padding:.8rem 1.5rem;font-size:.85rem;display:flex;align-items:center;gap:.6rem;
      z-index:3000;opacity:0;transition:all .35s;box-shadow:0 8px 30px rgba(0,0,0,.3);max-width:90vw;
    }
    .toast-msg.show{transform:translateX(-50%) translateY(0);opacity:1;}
    .toast-msg.success{border-color:var(--success);color:var(--success);}
    .toast-msg.error{border-color:var(--danger);color:var(--danger);}

    /* ========== تفاصيل المنتج ========== */
    .product-detail{
      background:var(--card);backdrop-filter:blur(8px);border:1px solid var(--border);
      border-radius:20px;padding:clamp(1.25rem,4vw,2rem);
    }

    .gallery-main{
      width:100%;aspect-ratio:1/1;border-radius:16px;overflow:hidden;background:var(--gray);
      border:1px solid var(--border);
    }
    .gallery-main img,.gallery-main video{width:100%;height:100%;object-fit:contain;background:var(--bg2);padding:1rem;}
    .gallery-thumbs{display:flex;gap:.5rem;margin-top:.75rem;overflow-x:auto;padding-bottom:.5rem;}
    .gallery-thumb{width:70px;height:70px;border-radius:10px;overflow:hidden;cursor:pointer;
      border:2px solid var(--border);transition:all .3s;flex-shrink:0;}
    .gallery-thumb.active{border-color:var(--blue-primary);box-shadow:0 0 0 3px rgba(0,87,179,.2);}
    .gallery-thumb img,.gallery-thumb video{width:100%;height:100%;object-fit:cover;}

    .product-title{font-size:clamp(1.5rem,3vw,2.2rem);font-weight:800;margin-bottom:.5rem;color:var(--text);}
    .product-brand{font-size:.85rem;color:var(--text-dim);}
    .product-brand a{color:var(--blue-primary);text-decoration:none;}
    .product-brand a:hover{text-decoration:underline;}

    .product-rating{display:flex;align-items:center;gap:.5rem;margin:.5rem 0;flex-wrap:wrap;color:var(--text-dim);}
    .product-rating .stars{color:var(--blue-primary);font-size:1.2rem;}

    .product-price{font-size:2rem;font-weight:800;color:var(--blue-primary);}
    .product-price .currency{font-size:1rem;}
    .product-old-price{font-size:1.1rem;color:var(--text-dim);text-decoration:line-through;margin-right:.75rem;}
    .product-discount{background:var(--danger);color:#fff;padding:3px 12px;border-radius:20px;
      font-size:.8rem;font-weight:700;margin-right:.75rem;}
    .product-tax{font-size:.8rem;color:var(--text-dim);margin-top:.25rem;}

    .installments{background:var(--bg2);border:1px solid var(--border);padding:.5rem 1rem;border-radius:10px;margin:.5rem 0;font-size:.85rem;}
    .installments span{color:var(--success);font-weight:700;}

    .stock-status{display:flex;align-items:center;gap:.5rem;font-weight:700;margin:.5rem 0;}
    .stock-status.in{color:var(--success);}
    .stock-status.low{color:var(--warning);}
    .stock-status.out{color:var(--danger);}

    .free-shipping{background:var(--bg2);border:1px solid var(--border);padding:.5rem 1rem;border-radius:10px;color:var(--success);font-size:.85rem;margin:.5rem 0;}

    .description{color:var(--text-muted);line-height:1.8;margin:1rem 0;font-size:.95rem;}

    .variants{margin:1rem 0;}
    .variant-group{margin-bottom:1rem;}
    .variant-label{font-weight:600;font-size:.85rem;margin-bottom:.5rem;display:block;color:var(--text);}
    .variant-options{display:flex;gap:.5rem;flex-wrap:wrap;}
    .variant-option{
      padding:.5rem 1rem;border:1.5px solid var(--border2);border-radius:10px;background:transparent;
      color:var(--text);cursor:pointer;transition:all .3s;font-family:inherit;font-size:.8rem;
      display:flex;align-items:center;gap:.3rem;
    }
    .variant-option:hover{border-color:var(--blue-primary);}
    .variant-option.selected{border-color:var(--blue-primary);background:rgba(0,87,179,.12);box-shadow:0 0 0 3px rgba(0,87,179,.15);}
    .variant-option:disabled{opacity:.4;cursor:not-allowed;}
    .color-swatch{width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);display:inline-block;}

    .qty-selector{display:flex;align-items:center;gap:1rem;margin:1rem 0;flex-wrap:wrap;}
    .qty-btn{width:40px;height:40px;border:1.5px solid var(--border2);border-radius:10px;background:rgba(0,87,179,.05);
      color:var(--text);cursor:pointer;font-size:1.1rem;transition:all .3s;display:flex;align-items:center;justify-content:center;}
    .qty-btn:hover{border-color:var(--blue-primary);color:var(--blue-primary);}
    .qty-value{font-size:1.2rem;font-weight:700;min-width:40px;text-align:center;}

    .action-buttons{display:flex;gap:1rem;flex-wrap:wrap;margin:1rem 0;}
    .action-buttons .btn{
      padding:.85rem 2rem;border-radius:50px;border:none;font-family:inherit;font-weight:700;
      cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;
      gap:.5rem;font-size:.9rem;flex:1;min-width:160px;
    }
    .action-buttons .btn-primary{background:var(--blue-primary);color:#fff;}
    .action-buttons .btn-primary:hover{background:var(--blue-dark);transform:translateY(-2px);}
    .action-buttons .btn-secondary{background:rgba(0,87,179,.08);border:1.5px solid var(--border2);color:var(--text-dim);}
    .action-buttons .btn-whatsapp{background:var(--success);color:#fff;}
    .action-buttons .btn-whatsapp:hover{opacity:.9;transform:translateY(-2px);}
    .action-buttons .btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

    .seller-info{border-top:1px solid var(--border);padding-top:1rem;margin-top:1rem;display:flex;align-items:center;gap:1rem;font-size:.85rem;}
    .seller-info .seller-name{font-weight:700;color:var(--text);}

    /* ===== التبويبات ===== */
    .product-tabs{margin-top:2rem;}
    .tab-headers{display:flex;gap:.5rem;border-bottom:2px solid var(--border);padding-bottom:.5rem;flex-wrap:wrap;}
    .tab-headers button{
      padding:.5rem 1.5rem;border:none;background:transparent;color:var(--text-dim);cursor:pointer;
      font-family:inherit;font-weight:600;transition:all .3s;font-size:.9rem;
    }
    .tab-headers button.active{color:var(--blue-primary);border-bottom:3px solid var(--blue-primary);margin-bottom:-2px;}
    .tab-headers button:hover{color:var(--blue-primary);}
    .tab-content{padding:1.5rem 0;}
    .tab-pane{display:none;}
    .tab-pane.active{display:block;animation:fadeIn .3s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

    .specs-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;}
    .spec-item{padding:.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;}
    .spec-item .label{color:var(--text-dim);font-size:.85rem;}
    .spec-item .value{font-weight:500;font-size:.85rem;color:var(--text);}

    /* ===== التقييمات ===== */
    .review-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1rem;margin-bottom:1rem;}
    .review-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;flex-wrap:wrap;gap:.3rem;}
    .review-name{font-weight:700;color:var(--text);}
    .review-rating{color:var(--blue-primary);}
    .review-comment{color:var(--text-muted);font-size:.9rem;}
    .review-date{font-size:.7rem;color:var(--text-dim);margin-top:.5rem;}
    .verified-badge{background:var(--success);color:#fff;padding:1px 8px;border-radius:12px;font-size:.6rem;font-weight:700;margin-right:.5rem;}

    .review-form{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:1.5rem;margin-bottom:2rem;}
    .review-form .form-group{margin-bottom:1rem;}
    .review-form label{display:block;font-weight:600;margin-bottom:.3rem;font-size:.85rem;color:var(--text-muted);}
    .review-input{
      background:rgba(0,0,0,.05);border:1px solid var(--border2);border-radius:12px;
      padding:.75rem 1rem;color:var(--text);width:100%;font-family:inherit;transition:all .3s;
    }
    .review-input:focus{outline:none;border-color:var(--blue-primary);}
    .review-input::placeholder{color:var(--text-dim);}
    .rating-stars{display:flex;gap:.5rem;font-size:2rem;}
    .rating-stars i{cursor:pointer;transition:.3s;color:var(--border2);}
    .rating-stars i.active{color:var(--blue-primary);}
    .rating-stars i:hover{transform:scale(1.2);}

    .can-review-info{border-radius:10px;padding:.75rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.75rem;}
    .can-review-info i{font-size:1.2rem;}
    .can-review-info.can{background:rgba(37,211,102,.1);border:1px solid var(--success);color:var(--success);}
    .can-review-info.cannot{background:rgba(255,165,2,.1);border:1px solid var(--warning);color:var(--warning);}

    /* ===== منتجات مشابهة ===== */
    .related-products{margin-top:3rem;}
    .related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;}
    .related-card{
      background:var(--card);border:1px solid var(--border);border-radius:14px;padding:.75rem;
      transition:all .3s;text-align:center;text-decoration:none;color:var(--text);
    }
    .related-card:hover{transform:translateY(-4px);border-color:var(--blue-primary);box-shadow:0 10px 25px rgba(0,87,179,.15);}
    .related-card img{width:100%;aspect-ratio:1/1;object-fit:contain;background:var(--bg2);padding:.5rem;border-radius:8px;}
    .related-name{font-size:.8rem;font-weight:600;margin:.5rem 0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .related-price{font-size:1rem;font-weight:700;color:var(--blue-primary);}

    /* ===== Responsive ===== */
    @media (max-width:768px){
      .product-detail{padding:1rem;}
      .specs-grid{grid-template-columns:1fr;}
      .action-buttons .btn{flex:1 1 100%;}
      .related-grid{grid-template-columns:repeat(2,1fr);}
      .whatsapp-float{width:45px;height:45px;font-size:1.3rem;bottom:20px;left:20px;}
    }
    @media (max-width:480px){
      .gallery-thumb{width:50px;height:50px;}
      .related-grid{grid-template-columns:repeat(2,1fr);}
    }
  </style>
</head>
<body>

  <!-- الهيدر كيتم إضافته تلقائياً عبر header.js -->

  <a href="https://wa.me/212612345678" target="_blank" class="whatsapp-float" aria-label="واتساب" id="whatsappFloat">
    <i class="fab fa-whatsapp"></i>
  </a>

  <main class="page-wrap">
    <div id="productContent">
      <div class="loader-spinner"></div>
    </div>
  </main>

  <!-- الفوتر كيتم إضافته تلقائياً عبر footer.js -->

  <div class="toast-msg" id="toastMsg"></div>

  <script src="header.js"></script>
  <script src="footer.js"></script>

  <script>
    AOS.init({ duration: 600, once: true });

    // تحديث رابط الواتساب من config.js
    if (typeof MARNISSA_CONFIG !== 'undefined') {
      const whatsappFloat = document.getElementById('whatsappFloat');
      if (whatsappFloat && MARNISSA_CONFIG.SOCIAL && MARNISSA_CONFIG.SOCIAL.whatsapp) {
        whatsappFloat.href = MARNISSA_CONFIG.SOCIAL.whatsapp;
      }
    }

    // ===== CONFIG =====
    const sb = window.sb;
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');

    // ===== المستخدم الحالي =====
    const CURRENT_USER_ID = localStorage.getItem('userId') || 'faf42d36';
    const CURRENT_USER_EMAIL = localStorage.getItem('userEmail') || 'client@example.com';

    let currentProduct = null;
    let allMedia = [];
    let selectedVariants = {};
    let currentQty = 1;
    let currentRating = 0;
    let categoriesMap = {};
    let userHasCompletedOrder = false;
    let userReviewExists = false;

    // ===== التحقق من الطلب المكتمل =====
    async function checkUserCanReview(productId) {
      try {
        const { data, error } = await sb
          .from('order_items')
          .select(`
            id, order_id,
            orders!inner ( id, user_id, status, created_at )
          `)
          .eq('product_id', productId)
          .eq('orders.user_id', CURRENT_USER_ID)
          .eq('orders.status', 'completed')
          .limit(1);

        if (error) { userHasCompletedOrder = false; return false; }
        userHasCompletedOrder = data && data.length > 0;

        const { data: reviewData, error: reviewError } = await sb
          .from('reviews')
          .select('id')
          .eq('product_id', productId)
          .eq('user_id', CURRENT_USER_ID)
          .limit(1);

        userReviewExists = (!reviewError && reviewData && reviewData.length > 0);
        return userHasCompletedOrder;
      } catch (error) {
        console.error('❌ خطأ فالتحقق:', error);
        userHasCompletedOrder = false;
        return false;
      }
    }

    // ===== FETCH PRODUCT =====
    async function fetchProduct() {
      const container = document.getElementById('productContent');
      container.innerHTML = `<div class="loader-spinner"></div>`;

      if (!productId) {
        container.innerHTML = `
          <div class="text-center py-12">
            <i class="fas fa-exclamation-circle text-4xl opacity-30"></i>
            <p class="mt-2 darija-text" style="color:var(--text-dim);">المنتج غير موجود</p>
            <a href="index.html" class="gold-btn darija-text" style="display:inline-flex;margin-top:1rem;padding:.6rem 2rem;">
              <i class="fas fa-arrow-right"></i> رجوع للرئيسية
            </a>
          </div>
        `;
        return;
      }

      try {
        const { data: product, error } = await sb.from('products').select('*').eq('id', productId).single();
        if (error || !product) throw new Error('المنتج غير موجود');

        currentProduct = product;

        const { data: categories } = await sb.from('categories').select('id, name');
        if (categories) categories.forEach(cat => categoriesMap[cat.id] = cat.name);

        const { data: reviews } = await sb
          .from('reviews')
          .select('*')
          .eq('product_id', productId)
          .eq('is_approved', true)
          .order('created_at', { ascending: false });

        await checkUserCanReview(productId);
        renderProduct(product, reviews || []);

      } catch (error) {
        console.error('❌ خطأ:', error);
        container.innerHTML = `
          <div class="text-center py-12">
            <i class="fas fa-exclamation-triangle text-4xl opacity-30" style="color:var(--danger);"></i>
            <p class="mt-2 darija-text" style="color:var(--text-dim);">${error.message || 'مشكل فجلب المنتج'}</p>
            <button onclick="fetchProduct()" class="gold-btn darija-text mt-4">
              <i class="fas fa-sync"></i> حاول مرة أخرى
            </button>
          </div>
        `;
      }
    }

    // ===== RENDER PRODUCT =====
    function renderProduct(product, reviews) {
      document.title = product.name + ' | MarnissaMall';
      const container = document.getElementById('productContent');

      allMedia = (product.images || []).map(url => ({ type: 'image', url }));
      if (product.video_url) allMedia.push({ type: 'video', url: product.video_url });
      if (allMedia.length === 0) {
        allMedia.push({ type: 'image', url: 'https://placehold.co/600x600/161b22/0057b3?text=' + encodeURIComponent(product.name) });
      }

      const variants = product.variants || [];
      const hasVariants = variants.some(v => v.options?.length > 0);
      const salePercent = product.old_price ? Math.round((1 - product.price / product.old_price) * 100) : 0;
      const stockStatus = getStockStatus(product);
      
      // ====== الحصول على اسم الفئة وبناء الرابط ======
      const categoryName = categoriesMap[product.category_id] || '';
      let categoryLink = 'product.html'; // الرابط الافتراضي
    
      // إذا كان للمنتج category_id، نضيفه كمعامل
      if (product.category_id) {
        categoryLink = `product.html?category=${product.category_id}`;
      }

      container.innerHTML = `
        <nav class="text-sm mb-4 darija-text" style="color:var(--text-dim);">
          <a href="index.html" style="color:var(--blue-primary);">الرئيسية</a>
          <span class="mx-2">›</span>
          ${categoryName ? `
            <a href="${categoryLink}" style="color:var(--blue-primary);">${escapeHtml(categoryName)}</a>
            <span class="mx-2">›</span>
          ` : ''}
          <span>${escapeHtml(product.name)}</span>
        </nav>

        <div class="product-detail grid md:grid-cols-2 gap-8">
          <!-- ===== GALLERY ===== -->
          <div>
            <div class="gallery-main" id="galleryMain"></div>
            <div class="gallery-thumbs" id="galleryThumbs"></div>
          </div>

          <!-- ===== INFO ===== -->
          <div>
            <div class="product-brand darija-text">
              <i class="fas fa-tag"></i> ${categoryName ? escapeHtml(categoryName) : 'منتج'}
              ${product.brand ? `| العلامة: <a href="#">${escapeHtml(product.brand)}</a>` : ''}
            </div>

            <h1 class="product-title darija-text">${escapeHtml(product.name)}</h1>

            <div class="product-rating">
              <span class="stars">${'★'.repeat(Math.round(product.rating_avg || 0))}${'☆'.repeat(5 - Math.round(product.rating_avg || 0))}</span>
              <span>${(product.rating_avg || 0).toFixed(1)}</span>
              <span>(${product.rating_count || 0} تقييم)</span>
              <span>| ${product.orders_count || 0} طلب</span>
            </div>

            <div>
              <span class="product-price darija-text">${Number(product.price).toFixed(2)} <span class="currency">درهم</span></span>
              ${product.old_price ? `<span class="product-old-price">${product.old_price} درهم</span>` : ''}
              ${salePercent > 0 ? `<span class="product-discount">-${salePercent}%</span>` : ''}
            </div>

            <div class="product-tax darija-text">السعر شامل الضريبة</div>

            ${product.old_price ? `
              <div class="installments darija-text">
                <i class="fas fa-credit-card"></i> أو <span>${Math.round(product.price / 3)} درهم</span> على 3 دفعات بدون فوائد
              </div>
            ` : ''}

            <div class="stock-status ${stockStatus.cls} darija-text">
              <i class="fas ${stockStatus.icon}"></i> ${stockStatus.label}
              ${product.stock > 0 && product.stock <= 5 ? `<span style="font-weight:400;font-size:.8rem;">(أسرع، باقي ${product.stock} قطع)</span>` : ''}
            </div>

            ${product.price > 200 ? `
              <div class="free-shipping darija-text"><i class="fas fa-truck"></i> شحن مجاني لهذا المنتج</div>
            ` : `
              <div class="free-shipping darija-text" style="color:var(--text-dim);">
                <i class="fas fa-truck"></i> تكلفة التوصيل: ${MARNISSA_CONFIG?.SHIPPING_COST || 25} درهم
              </div>
            `}

            <div class="description darija-text">${escapeHtml(product.description || 'لا يوجد وصف لهذا المنتج')}</div>

            ${hasVariants ? `
              <div class="variants">
                ${variants.map(v => {
                  if (!v.options || v.options.length === 0) return '';
                  const isColor = v.type === 'لون' || v.type === 'اللون' || v.type === 'color';
                  return `
                    <div class="variant-group">
                      <label class="variant-label darija-text">${escapeHtml(v.type)}:</label>
                      <div class="variant-options">
                        ${v.options.map(opt => {
                          const isSelected = selectedVariants[v.type] === opt.value;
                          const isOutOfStock = opt.stock !== undefined && opt.stock <= 0;
                          return `
                            <button class="variant-option ${isSelected ? 'selected' : ''}"
                                    data-group="${escapeHtml(v.type)}"
                                    data-value="${escapeHtml(opt.value)}"
                                    ${isOutOfStock ? 'disabled' : ''}
                                    title="${opt.price_extra ? 'فرق السعر: ' + opt.price_extra + ' درهم' : ''}${isOutOfStock ? ' - غير متوفر' : ''}">
                              ${isColor ? `<span class="color-swatch" style="background:${getColorHex(opt.value)};"></span>` : ''}
                              ${escapeHtml(opt.value)}
                              ${opt.price_extra ? ` <small style="opacity:.7;">(${opt.price_extra > 0 ? '+' : ''}${opt.price_extra}dh)</small>` : ''}
                              ${isOutOfStock ? ' <small style="color:var(--danger);">(نفذ)</small>' : ''}
                            </button>
                          `;
                        }).join('')}
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            ` : ''}

            ${product.is_available && product.stock > 0 ? `
              <div class="qty-selector">
                <button class="qty-btn" id="qtyMinus"><i class="fas fa-minus"></i></button>
                <span class="qty-value" id="qtyValue">1</span>
                <button class="qty-btn" id="qtyPlus"><i class="fas fa-plus"></i></button>
                <span style="font-size:.8rem;color:var(--text-dim);">الحد الأقصى: ${product.max_order_quantity || 10}</span>
              </div>
            ` : ''}

            <div class="action-buttons">
              ${product.is_available && product.stock > 0 ? `
                <button class="btn btn-primary darija-text" id="addToCartBtn">
                  <i class="fas fa-cart-plus"></i> أضف للسلة
                </button>
                <button class="btn btn-whatsapp darija-text" onclick="window.open('https://wa.me/212612345678?text=${encodeURIComponent('سلام، بغيت نزيد معلومات على: ' + product.name)}', '_blank')">
                  <i class="fab fa-whatsapp"></i> اسأل عبر واتساب
                </button>
              ` : `
                <button class="btn btn-secondary darija-text" disabled>
                  <i class="fas fa-ban"></i> غير متوفر حالياً
                </button>
              `}
            </div>

            <div class="seller-info darija-text">
              <i class="fas fa-store" style="color:var(--blue-primary);font-size:1.2rem;"></i>
              <div>
                <div class="seller-name">يُباع من طرف: MarnissaMall</div>
                <div style="font-size:.8rem;color:var(--text-dim);">
                  <i class="fas fa-star" style="color:var(--blue-primary);"></i> 4.8 (تقييم البائع)
                </div>
              </div>
            </div>

            <div style="margin-top:1rem;font-size:.75rem;color:var(--text-dim);">
              <div><i class="fas fa-barcode"></i> SKU: ${escapeHtml(product.sku || 'غير متوفر')}</div>
              ${product.tags && product.tags.length > 0 ? `
                <div class="mt-1 flex gap-2 flex-wrap">
                  ${product.tags.map(tag => `<span style="background:var(--bg2);padding:2px 10px;border-radius:12px;border:1px solid var(--border);">#${escapeHtml(tag)}</span>`).join(' ')}
                </div>
              ` : ''}
            </div>
          </div>
        </div>

        <!-- ===== TABS ===== -->
        <div class="product-tabs">
          <div class="tab-headers">
            <button class="active" data-tab="description">📝 الوصف</button>
            <button data-tab="specs">📋 المواصفات</button>
            <button data-tab="reviews">⭐ التقييمات (${reviews.length})</button>
          </div>

          <div class="tab-content">
            <div class="tab-pane active" id="tab-description">
              <div class="darija-text" style="line-height:1.8;color:var(--text-muted);">
                ${escapeHtml(product.long_description || product.description || 'لا يوجد وصف تفصيلي لهذا المنتج')}
              </div>
            </div>

            <div class="tab-pane" id="tab-specs">
              <div class="specs-grid darija-text">
                ${product.weight ? `<div class="spec-item"><span class="label">الوزن</span><span class="value">${escapeHtml(product.weight)}</span></div>` : ''}
                ${product.dimensions ? `<div class="spec-item"><span class="label">الأبعاد</span><span class="value">${escapeHtml(product.dimensions)}</span></div>` : ''}
                ${product.materials ? `<div class="spec-item"><span class="label">المواد</span><span class="value">${escapeHtml(product.materials)}</span></div>` : ''}
                ${product.brand ? `<div class="spec-item"><span class="label">العلامة</span><span class="value">${escapeHtml(product.brand)}</span></div>` : ''}
                ${product.origin ? `<div class="spec-item"><span class="label">بلد المنشأ</span><span class="value">${escapeHtml(product.origin)}</span></div>` : ''}
                ${product.warranty ? `<div class="spec-item"><span class="label">الضمان</span><span class="value">${escapeHtml(product.warranty)}</span></div>` : ''}
                ${product.processing_time ? `<div class="spec-item"><span class="label">وقت التجهيز</span><span class="value">${product.processing_time} أيام</span></div>` : ''}
                ${product.max_order_quantity ? `<div class="spec-item"><span class="label">أقصى كمية</span><span class="value">${product.max_order_quantity}</span></div>` : ''}
                ${product.sku ? `<div class="spec-item"><span class="label">SKU</span><span class="value">${escapeHtml(product.sku)}</span></div>` : ''}
              </div>
            </div>

            <div class="tab-pane" id="tab-reviews">
              ${renderReviews(reviews, product)}
            </div>
          </div>
        </div>

        <!-- ===== RELATED ===== -->
        <div class="related-products">
          <h3 class="text-xl font-bold mb-4 darija-text" style="color:var(--text);">🛍️ منتجات قد تعجبك</h3>
          <div class="related-grid" id="relatedGrid">
            <div class="loader-spinner" style="grid-column:1/-1;"></div>
          </div>
        </div>
      `;

      renderGallery();
      setupTabs();
      setupVariants(product);
      setupQuantity(product);
      setupAddToCart(product);
      setupRatingStars(product);
      loadRelatedProducts(product.category_id, product.id);
    }

    // ===== GALLERY =====
    let activeMediaIndex = 0;
    function renderGallery() {
      const main = document.getElementById('galleryMain');
      const thumbs = document.getElementById('galleryThumbs');

      function showMedia(index) {
        activeMediaIndex = index;
        const m = allMedia[index];
        main.innerHTML = m.type === 'video'
          ? `<video src="${m.url}" controls muted autoplay loop></video>`
          : `<img src="${m.url}" alt="${escapeHtml(currentProduct.name)}" onerror="this.src='https://placehold.co/600x600/161b22/0057b3?text=📦'">`;
        thumbs.querySelectorAll('.gallery-thumb').forEach((t, i) => t.classList.toggle('active', i === index));
      }

      thumbs.innerHTML = allMedia.map((m, i) => `
        <div class="gallery-thumb ${i === 0 ? 'active' : ''}" data-index="${i}">
          ${m.type === 'video' ? `<video src="${m.url}" muted></video>` : `<img src="${m.url}" alt="thumb" onerror="this.src='https://placehold.co/70x70/161b22/0057b3?text=📦'">`}
        </div>
      `).join('');

      thumbs.querySelectorAll('.gallery-thumb').forEach(t => {
        t.addEventListener('click', () => showMedia(parseInt(t.dataset.index)));
      });

      showMedia(0);
    }

    // ===== TABS =====
    function setupTabs() {
      document.querySelectorAll('.tab-headers button').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.tab-headers button').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          const tabId = this.dataset.tab;
          document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
          document.getElementById(`tab-${tabId}`).classList.add('active');
        });
      });
    }

    // ===== VARIANTS =====
    function setupVariants(product) {
      document.querySelectorAll('.variant-option').forEach(btn => {
        btn.addEventListener('click', function() {
          const group = this.dataset.group;
          const value = this.dataset.value;
          if (selectedVariants[group] === value) delete selectedVariants[group];
          else selectedVariants[group] = value;
          renderProduct(product, currentProduct._reviews || []);
        });
      });
    }

    // ===== QUANTITY =====
    function setupQuantity(product) {
      const minus = document.getElementById('qtyMinus');
      const plus = document.getElementById('qtyPlus');
      const valueEl = document.getElementById('qtyValue');
      if (!minus || !plus) return;

      const maxQty = product.max_order_quantity || 10;

      minus.addEventListener('click', () => {
        if (currentQty > 1) { currentQty--; valueEl.textContent = currentQty; }
      });
      plus.addEventListener('click', () => {
        if (currentQty < maxQty && currentQty < product.stock) {
          currentQty++; valueEl.textContent = currentQty;
        } else {
          showToast('⚠️ الكمية المطلوبة أكبر من المخزون أو الحد الأقصى للطلب', 'error');
        }
      });
    }

    // ===== ADD TO CART =====
    function setupAddToCart(product) {
      const btn = document.getElementById('addToCartBtn');
      if (!btn) return;

      btn.addEventListener('click', () => {
        let finalPrice = product.price;
        const variants = product.variants || [];
        variants.forEach(v => {
          if (selectedVariants[v.type]) {
            const selectedOpt = v.options.find(o => o.value === selectedVariants[v.type]);
            if (selectedOpt) finalPrice += (selectedOpt.price_extra || 0);
          }
        });

        const variantKey = Object.entries(selectedVariants).map(([k, v]) => `${k}:${v}`).join('|');
        const uniqueId = variantKey ? `${product.id}_${variantKey}` : product.id;

        let cart = JSON.parse(localStorage.getItem('marnissaCart')) || [];
        const existing = cart.find(item => item.uniqueId === uniqueId);

        if (existing) {
          if (existing.qty + currentQty > product.stock) {
            showToast('⚠️ الكمية الإجمالية تتجاوز المخزون المتاح', 'error');
            return;
          }
          existing.qty += currentQty;
        } else {
          cart.push({
            id: product.id, uniqueId, name: product.name, price: finalPrice,
            image: (product.images && product.images[0]) || '', stock: product.stock,
            qty: currentQty, variants: { ...selectedVariants }, sku: product.sku
          });
        }

        localStorage.setItem('marnissaCart', JSON.stringify(cart));
        if (window.updateCartCount) window.updateCartCount();
        showToast('✅ تمت إضافة المنتج للسلة', 'success');
      });
    }

    // ===== REVIEWS =====
    function renderReviews(reviews, product) {
      let reviewsHTML = '';
      if (reviews && reviews.length > 0) {
        reviewsHTML = `
          <div class="grid gap-4">
            ${reviews.map(rev => `
              <div class="review-card">
                <div class="review-header">
                  <span class="review-name darija-text">
                    ${escapeHtml(rev.name)}
                    ${rev.user_id ? `<span class="verified-badge"><i class="fas fa-check"></i> مشتري مؤكد</span>` : ''}
                  </span>
                  <span class="review-rating">${'★'.repeat(rev.rating)}${'☆'.repeat(5 - rev.rating)}</span>
                </div>
                <div class="review-comment darija-text">${escapeHtml(rev.comment || '')}</div>
                <div class="review-date">${new Date(rev.created_at).toLocaleDateString('ar-MA', { year:'numeric', month:'long', day:'numeric' })}</div>
              </div>
            `).join('')}
          </div>
        `;
      } else {
        reviewsHTML = `
          <div class="text-center py-8 darija-text" style="color:var(--text-dim);">
            <i class="far fa-comment-dots text-3xl mb-3 block opacity-40"></i>
            لا توجد آراء بعد. كن أول واحد يشارك رأيه!
          </div>
        `;
      }

      let reviewFormHTML = '';
      if (userHasCompletedOrder && !userReviewExists) {
        reviewFormHTML = `
          <div class="review-form" data-aos="fade-up">
            <h4 class="font-bold mb-4 darija-text" style="color:var(--text);">
              <i class="fas fa-pen" style="color:var(--blue-primary);"></i> شاركنا رأيك فهاد المنتج
            </h4>
            <div class="can-review-info can darija-text">
              <i class="fas fa-check-circle"></i>
              <div>
                <strong>✅ يمكنك تقييم هذا المنتج</strong>
                <div style="font-size:.8rem;opacity:.8;">لقد اشتريت هذا المنتج وطلبك مكتمل</div>
              </div>
            </div>
            <div class="form-group">
              <label class="darija-text">اسمك</label>
              <input type="text" id="reviewName" value="${escapeHtml(CURRENT_USER_EMAIL)}" class="review-input darija-text" readonly style="opacity:.7;">
            </div>
            <div class="form-group">
              <label class="darija-text">تقييمك</label>
              <div class="rating-stars" id="ratingStars">
                ${[1,2,3,4,5].map(i => `<i class="far fa-star" data-rating="${i}"></i>`).join('')}
              </div>
            </div>
            <div class="form-group">
              <label class="darija-text">رأيك في المنتج</label>
              <textarea id="reviewComment" rows="4" placeholder="شاركنا تجربتك مع المنتج..." class="review-input darija-text"></textarea>
            </div>
            <button id="submitReview" class="gold-btn btn-filled darija-text" style="width:100%;padding:.85rem;justify-content:center;display:flex;">
              <i class="fas fa-paper-plane"></i> نشر التقييم
            </button>
          </div>
        `;
      } else if (userReviewExists) {
        reviewFormHTML = `
          <div class="can-review-info can darija-text">
            <i class="fas fa-check-circle"></i>
            <div>
              <strong>✅ لقد قمت بتقييم هذا المنتج من قبل</strong>
              <div style="font-size:.8rem;opacity:.8;">شكراً لمشاركتنا رأيك</div>
            </div>
          </div>
        `;
      } else {
        reviewFormHTML = `
          <div class="can-review-info cannot darija-text">
            <i class="fas fa-lock"></i>
            <div>
              <strong>🔒 يمكنك تقييم هذا المنتج فقط إذا اشتريته</strong>
              <div style="font-size:.8rem;opacity:.8;">قم بشراء المنتج وأكمل الطلب لتتمكن من التقييم</div>
            </div>
          </div>
        `;
      }

      return `${reviewFormHTML}<div>${reviewsHTML}</div>`;
    }

    // ===== RATING STARS =====
    function setupRatingStars(product) {
      const stars = document.querySelectorAll('.rating-stars i');
      if (!stars.length) return;

      stars.forEach(star => {
        star.addEventListener('mouseenter', function() {
          const r = parseInt(this.dataset.rating);
          stars.forEach((s, i) => s.classList.toggle('active', i < r));
        });
        star.addEventListener('mouseleave', function() {
          stars.forEach((s, i) => s.classList.toggle('active', i < currentRating));
        });
        star.addEventListener('click', function() {
          currentRating = parseInt(this.dataset.rating);
          stars.forEach((s, i) => s.classList.toggle('active', i < currentRating));
        });
      });

      document.getElementById('submitReview')?.addEventListener('click', () => submitReview(product));
    }

    // ===== SUBMIT REVIEW =====
    async function submitReview(product) {
      const comment = document.getElementById('reviewComment').value.trim();
      const rating = currentRating;

      if (!comment || rating === 0) {
        showToast('⚠️ المرجو إدخال رأيك وتقييمك', 'error');
        return;
      }

      try {
        const { error } = await sb.from('reviews').insert({
          product_id: productId, user_id: CURRENT_USER_ID, name: CURRENT_USER_EMAIL,
          comment, rating, is_approved: true
        });
        if (error) throw error;

        document.getElementById('reviewComment').value = '';
        currentRating = 0;
        document.querySelectorAll('.rating-stars i').forEach(s => s.classList.remove('active'));
        showToast('✨ شكراً! تم إضافة رأيك بنجاح', 'success');
        setTimeout(() => fetchProduct(), 1000);
      } catch (error) {
        showToast('❌ فشل إرسال التقييم: ' + error.message, 'error');
      }
    }

    // ===== RELATED PRODUCTS =====
    async function loadRelatedProducts(categoryId, productId) {
      const grid = document.getElementById('relatedGrid');
      try {
        let query = sb.from('products').select('id, name, price, images').neq('id', productId);
        
        // إذا كان هناك categoryId، نبحث بنفس الفئة
        if (categoryId) {
          query = query.eq('category_id', categoryId);
        }
        
        const { data, error } = await query
          .eq('is_available', true)
          .limit(6);

        if (error || !data || data.length === 0) {
          grid.innerHTML = `<div class="col-span-full text-center py-4 darija-text" style="color:var(--text-dim);">لا توجد منتجات مشابهة</div>`;
          return;
        }

        grid.innerHTML = data.map(p => `
          <a href="product-detail.html?id=${p.id}" class="related-card">
            <img src="${p.images && p.images[0] ? p.images[0] : 'https://placehold.co/200x200/161b22/0057b3?text=📦'}" alt="${escapeHtml(p.name)}" loading="lazy" onerror="this.src='https://placehold.co/200x200/161b22/0057b3?text=📦'">
            <div class="related-name darija-text">${escapeHtml(p.name)}</div>
            <div class="related-price darija-text">${Number(p.price).toFixed(2)} درهم</div>
          </a>
        `).join('');
      } catch (error) {
        console.warn('⚠️ مشكل فجلب المنتجات المشابهة:', error);
        grid.innerHTML = '';
      }
    }

    // ===== HELPERS =====
    function getStockStatus(p) {
      if (!p.is_available || p.stock <= 0) return { cls: 'out', icon: 'fa-times-circle', label: 'غير متوفر' };
      if (p.stock <= 5) return { cls: 'low', icon: 'fa-exclamation-triangle', label: `${p.stock} قطع متبقية` };
      return { cls: 'in', icon: 'fa-check-circle', label: 'متوفر' };
    }

    function getColorHex(value) {
      const colors = {
        'أحمر':'#ff4757','أزرق':'#3742fa','أخضر':'#2ed573','أسود':'#2f3542',
        'أبيض':'#f1f2f6','أصفر':'#ffa502','برتقالي':'#ff6348','بنفسجي':'#a55eea',
        'وردي':'#ff6b81','رمادي':'#a4b0be','بني':'#8b4513','ذهبي':'#ffd700',
        'فضي':'#c0c0c0','بيج':'#f5f5dc','كحلي':'#000080','زيتي':'#556b2f'
      };
      return colors[value] || '#718093';
    }

    function escapeHtml(s) {
      if (!s) return '';
      return String(s).replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
    }

    function showToast(text, type) {
      const toast = document.getElementById('toastMsg');
      toast.textContent = text;
      toast.className = `toast-msg ${type} show`;
      clearTimeout(window._toastTimer);
      window._toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', () => {
      if (!window.sb) {
        document.getElementById('productContent').innerHTML = `
          <div class="text-center py-12">
            <i class="fas fa-exclamation-circle text-4xl opacity-30"></i>
            <p class="mt-2 darija-text" style="color:var(--text-dim);">مشكل فتهيئة قاعدة البيانات. تأكد من ملف config.js</p>
          </div>
        `;
        return;
      }
      fetchProduct();
    });
  </script>
</body>
</html>
