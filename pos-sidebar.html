     SIDEBAR - MarnissaMall POS
     ========================================== -->
<aside class="sidebar">
  <div class="brand">
    🧾 مول لاكيس
    <small>MarnissaMall</small>
  </div>

  <nav>
    <a href="pos.html" class="nav-item" data-page="pos">
      <i class="fas fa-cash-register"></i>
      <span>نقطة البيع</span>
    </a>
    <a href="pos-orders.html" class="nav-item" data-page="orders">
      <i class="fas fa-clipboard-list"></i>
      <span>الطلبات</span>
      <span class="badge-nav" id="sidebarOrdersBadge">0</span>
    </a>
    <a href="pos-transactions.html" class="nav-item" data-page="transactions">
      <i class="fas fa-history"></i>
      <span>المعاملات</span>
    </a>
    <a href="pos-wallet.html" class="nav-item" data-page="wallet">
      <i class="fas fa-wallet"></i>
      <span>المحفظة</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="online-status online" id="sidebarStatus">
      <span class="status-dot online" id="sidebarDot"></span>
      <span id="sidebarStatusText">متصل</span>
    </div>
    <div style="font-size:0.55rem;color:var(--text-dim);">
      <i class="fas fa-store"></i> Marnissa v2.0
    </div>
  </div>
</aside>

<style>
  /* ==========================================
     SIDEBAR STYLES
     ========================================== */
  :root {
    --sidebar-width: 240px;
    --blue-primary: #0057b3;
    --blue-dark: #003d80;
    --blue-light: #3a8fd4;
    --success: #25D366;
    --danger: #ff4757;
    --warning: #ffa502;
    --gold: #f5a623;
    --bg: #0a0a0a;
    --bg2: #0d1117;
    --bg3: #161b22;
    --text: #ffffff;
    --text-muted: #c9d1d9;
    --text-dim: #8b949e;
    --border: rgba(0,87,179,0.3);
    --border2: rgba(0,87,179,0.5);
    --radius: 14px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  body.blue-theme {
    --bg: #e8f0fe;
    --bg2: #ffffff;
    --bg3: #f0f5ff;
    --text: #0a0a0a;
    --text-muted: #1a3a5c;
    --text-dim: #4a6a8c;
    --border: rgba(0,87,179,0.2);
    --border2: rgba(0,87,179,0.3);
  }

  .sidebar {
    width: var(--sidebar-width);
    background: var(--bg3);
    border-left: 2px solid var(--border);
    min-height: 100vh;
    padding: 16px 12px;
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    z-index: 100;
    overflow-y: auto;
    transition: var(--transition);
    display: flex;
    flex-direction: column;
  }

  .sidebar .brand {
    font-size: 1.3rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--text) 60%, var(--blue-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
    padding: 12px 0 20px 0;
    border-bottom: 2px solid var(--border);
    margin-bottom: 16px;
    flex-shrink: 0;
  }
  .sidebar .brand small {
    font-size: 0.6rem;
    display: block;
    -webkit-text-fill-color: var(--text-dim);
    background: none;
  }

  .sidebar nav {
    flex: 1;
  }

  .sidebar .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 10px;
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    transition: var(--transition);
    margin-bottom: 4px;
    cursor: pointer;
  }
  .sidebar .nav-item:hover {
    background: var(--card-hover);
    color: var(--text);
  }
  .sidebar .nav-item.active {
    background: var(--blue-primary);
    color: #fff;
    box-shadow: 0 4px 16px rgba(0, 87, 179, 0.2);
  }
  .sidebar .nav-item i {
    width: 22px;
    text-align: center;
    font-size: 1rem;
    flex-shrink: 0;
  }
  .sidebar .nav-item .badge-nav {
    margin-right: auto;
    background: rgba(255, 71, 87, 0.15);
    color: var(--danger);
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.6rem;
  }
  .sidebar .nav-item.active .badge-nav {
    background: rgba(255, 255, 255, 0.15);
    color: #fff;
  }

  .sidebar .sidebar-footer {
    border-top: 1px solid var(--border);
    margin-top: 20px;
    padding-top: 16px;
    text-align: center;
    font-size: 0.6rem;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .sidebar .sidebar-footer .online-status {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 0.7rem;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 8px;
  }
  .sidebar .sidebar-footer .online-status.online {
    color: var(--success);
    border: 1px solid rgba(37, 211, 102, 0.3);
    background: rgba(37, 211, 102, 0.08);
  }
  .sidebar .sidebar-footer .online-status.offline {
    color: var(--danger);
    border: 1px solid rgba(255, 71, 87, 0.3);
    background: rgba(255, 71, 87, 0.08);
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .status-dot.online {
    background: var(--success);
  }
  .status-dot.offline {
    background: var(--danger);
  }

  /* ===== RESPONSIVE SIDEBAR ===== */
  @media (max-width: 1100px) {
    :root { --sidebar-width: 60px; }
    .sidebar .brand { font-size: 0.8rem; }
    .sidebar .brand small { display: none; }
    .sidebar .nav-item { padding: 10px 8px; font-size: 0.7rem; justify-content: center; }
    .sidebar .nav-item span { display: none; }
    .sidebar .nav-item .badge-nav { display: none; }
    .sidebar .sidebar-footer .online-status span:last-child { display: none; }
  }
  @media (max-width: 850px) {
    :root { --sidebar-width: 50px; }
    .sidebar .brand { font-size: 0.7rem; padding: 8px 0; }
    .sidebar .nav-item { padding: 8px 6px; font-size: 0.6rem; }
  }
  @media (max-width: 480px) {
    :root { --sidebar-width: 44px; }
    .sidebar { padding: 6px 2px; }
    .sidebar .brand { font-size: 0.6rem; padding: 6px 0; }
    .sidebar .nav-item { padding: 6px 4px; font-size: 0.5rem; }
    .sidebar .nav-item i { font-size: 0.8rem; width: 18px; }
  }

  /* ===== SIDEBAR TOGGLE BUTTON (للشاشات الصغيرة) ===== */
  .sidebar-toggle-btn {
    display: none;
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--blue-primary);
    color: white;
    border: none;
    border-radius: 50%;
    width: 48px;
    height: 48px;
    font-size: 1.2rem;
    cursor: pointer;
    box-shadow: var(--shadow);
    z-index: 200;
    transition: var(--transition);
  }
  .sidebar-toggle-btn:hover {
    transform: scale(1.05);
    background: var(--blue-dark);
  }

  @media (max-width: 850px) {
    .sidebar-toggle-btn { display: flex; align-items: center; justify-content: center; }
    .sidebar {
      transform: translateX(calc(100% - 50px));
      transition: var(--transition);
    }
    .sidebar.open {
      transform: translateX(0);
      width: 240px;
    }
    .sidebar.open .brand small { display: block; }
    .sidebar.open .nav-item span { display: inline; }
    .sidebar.open .nav-item .badge-nav { display: block; }
    .sidebar.open .sidebar-footer .online-status span:last-child { display: inline; }
  }
</style>

<script>
  // ==========================================
  // SIDEBAR LOGIC
  // ==========================================

  // ===== تفعيل الرابط الحالي =====
  document.addEventListener('DOMContentLoaded', function() {
    const currentPage = window.location.pathname.split('/').pop().replace('.html', '') || 'pos';
    const navItems = document.querySelectorAll('.sidebar .nav-item');

    navItems.forEach(item => {
      const page = item.dataset.page;
      if (page === currentPage) {
        item.classList.add('active');
      } else {
        item.classList.remove('active');
      }
    });

    // ===== تحديث عداد الطلبات في السايدبار =====
    updateSidebarBadge();

    // ===== زر فتح/غلق السايدبار =====
    const toggleBtn = document.getElementById('sidebarToggleBtn');
    const sidebar = document.querySelector('.sidebar');

    if (toggleBtn && sidebar) {
      toggleBtn.addEventListener('click', function() {
        sidebar.classList.toggle('open');
        const isOpen = sidebar.classList.contains('open');
        toggleBtn.innerHTML = isOpen ? '✕' : '☰';
        toggleBtn.style.background = isOpen ? 'var(--danger)' : 'var(--blue-primary)';
      });
    }

    // ===== إغلاق السايدبار عند الضغط خارجها (في الموبايل) =====
    document.addEventListener('click', function(e) {
      if (window.innerWidth <= 850) {
        const sidebar = document.querySelector('.sidebar');
        const toggleBtn = document.getElementById('sidebarToggleBtn');
        if (sidebar && toggleBtn && sidebar.classList.contains('open')) {
          if (!sidebar.contains(e.target) && !toggleBtn.contains(e.target)) {
            sidebar.classList.remove('open');
            toggleBtn.innerHTML = '☰';
            toggleBtn.style.background = 'var(--blue-primary)';
          }
        }
      }
    });
  });

  // ===== تحديث عداد الطلبات =====
  async function updateSidebarBadge() {
    try {
      const { count, error } = await window.sb
        .from('orders')
        .select('*', { count: 'exact', head: true })
        .in('status', ['pending', 'confirmed']);

      if (!error) {
        const badge = document.getElementById('sidebarOrdersBadge');
        if (badge) {
          badge.textContent = count || 0;
        }
      }
    } catch (e) {
      console.error('Error updating sidebar badge:', e);
    }
  }

  // ===== تحديث حالة الاتصال في السايدبار =====
  function updateSidebarOnlineStatus(isOnline) {
    const statusEl = document.getElementById('sidebarStatus');
    const dot = document.getElementById('sidebarDot');
    const text = document.getElementById('sidebarStatusText');

    if (!statusEl || !dot || !text) return;

    if (isOnline) {
      statusEl.className = 'online-status online';
      dot.className = 'status-dot online';
      text.textContent = 'متصل';
    } else {
      statusEl.className = 'online-status offline';
      dot.className = 'status-dot offline';
      text.textContent = 'غير متصل';
    }
  }

  // ===== إضافة زر فتح/غلق السايدبار =====
  document.addEventListener('DOMContentLoaded', function() {
    const sidebarToggle = document.createElement('button');
    sidebarToggle.id = 'sidebarToggleBtn';
    sidebarToggle.className = 'sidebar-toggle-btn';
    sidebarToggle.innerHTML = '☰';
    document.body.appendChild(sidebarToggle);

    // ربط حالة الاتصال بالحدث العام
    window.addEventListener('online', () => updateSidebarOnlineStatus(true));
    window.addEventListener('offline', () => updateSidebarOnlineStatus(false));

    // التحقق الأولي
    updateSidebarOnlineStatus(navigator.onLine);
  });
</script>
